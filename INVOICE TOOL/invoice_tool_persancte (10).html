function rid(){return window.crypto&&crypto.randomUUID?crypto.randomUUID():'id-'+Math.random().toString(36).slice(2)+Date.now().toString(36)}

 s+=tblock([fixed.senderName],mx,188,body,18,'#111111',700); s+=tblock([fixed.senderStudio,...sender],mx,214,body,18,'#111111',400); s+=tblock([`${t.taxWord}: ${fixed.taxNumber}`],mx,292,body,18,'#111111',500); s+=`<text x="${w-mx}" y="188" font-size="${small}" fill="#111111" fill-opacity="0.56" letter-spacing="1.4" font-weight="700" text-anchor="end">${ex(t.billTo.toUpperCase())}</text>`; s+=tblock(recipient,w-mx,216,body+1,19,'#111111',500,'end'); s+=tblock([`${t.invoiceNumberWord}: ${state.invoiceNumber||'—'}`,`${t.invoiceDateWord}: ${fdate(state.invoiceDate)||'—'}`],mx,364,body,24,'#111111',600); s+=`<line x1="${mx}" y1="${tableTop-18}" x2="${w-mx}" y2="${tableTop-18}" stroke="#111111" stroke-opacity="0.12" stroke-width="1"/><text x="${mx}" y="${tableTop}" font-size="${small}" fill="#111111" fill-opacity="0.56" letter-spacing="1.4" font-weight="700">${ex(t.serviceHead.toUpperCase())}</text><text x="${w-mx}" y="${tableTop}" font-size="${small}" fill="#111111" fill-opacity="0.56" letter-spacing="1.4" font-weight="700" text-anchor="end">${ex(t.amountHead.toUpperCase())}</text><line x1="${mx}" y1="${tableTop+12}" x2="${w-mx}" y2="${tableTop+12}" stroke="#111111" stroke-opacity="0.12" stroke-width="1"/>`; let y=tableTop+42; items.forEach(item=>{const desc=wrap(item.desc||'—',42).slice(0,2); s+=tblock(desc,mx,y,body+1,18,'#111111',500); s+=`<text x="${w-mx}" y="${y}" font-size="${body+1}" fill="#111111" font-weight="600" text-anchor="end">${ex(money(item.amount))}</text>`; const ly=y+rowH-20; s+=`<line x1="${mx}" y1="${ly}" x2="${w-mx}" y2="${ly}" stroke="#111111" stroke-opacity="0.08" stroke-width="1"/>`; y+=rowH}); s+=`<text x="${mx}" y="${footerTop-26}" font-size="${small}" fill="#111111" fill-opacity="0.56" letter-spacing="1.4" font-weight="700">${ex(t.totalWord.toUpperCase())}</text><text x="${w-mx}" y="${footerTop-26}" font-size="28" fill="#111111" font-weight="800" text-anchor="end">${ex(money(total))}</text><line x1="${mx}" y1="${footerTop}" x2="${w-mx}" y2="${footerTop}" stroke="#111111" stroke-opacity="0.12" stroke-width="1"/>`; const noteY=footerTop+38; s+=tblock([t.note1,t.note2,t.note3],mx,noteY,foot,18,'#111111',400); s+=tblock([`${t.bankWord}: ${fixed.bank}`,`${t.ibanWord}: ${fixed.iban}`,`${t.bicWord}: ${fixed.bic}`],w-mx,noteY,foot,18,'#111111',500,'end'); s+='</svg>'; return s}

function loadImage(url){return new Promise((res,rej)=>{const img=new Image(); img.onload=()=>res(img); img.onerror=rej; img.src=url})}
async function svgToCanvas(scale=3.125){const svg=buildSvg(), blob=new Blob([svg],{type:'image/svg+xml;charset=utf-8'}), url=URL.createObjectURL(blob); try{const img=await loadImage(url); const canvas=document.createElement('canvas'); canvas.width=Math.round(794*scale); canvas.height=Math.round(1123*scale); const ctx=canvas.getContext('2d'); ctx.fillStyle='#fbfaf4'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0,canvas.width,canvas.height); return canvas} finally{URL.revokeObjectURL(url)}}
function downloadBlob(blob, filename){const url=URL.createObjectURL(blob); const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); const a=document.createElement('a'); a.href=url; if(isIOS){a.target='_blank'; a.rel='noopener'} else a.download=filename; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),4000)}
async function exportPng(){if(document.fonts&&document.fonts.ready){try{await document.fonts.ready}catch(e){}}const canvas=await svgToCanvas(); const blob=await new Promise(r=>canvas.toBlob(r,'image/png')); if(!blob) throw new Error('PNG export failed'); downloadBlob(blob, `${fname()}.png`)}
async function exportPdf(){if(document.fonts&&document.fonts.ready){try{await document.fonts.ready}catch(e){}}const canvas=await svgToCanvas(); const blob=await new Promise(r=>canvas.toBlob(r,'image/jpeg',.95)); if(!blob) throw new Error('JPEG export failed'); const bytes=new Uint8Array(await blob.arrayBuffer()); const pdf=createPdfWithJpeg(bytes,595.28,841.89,canvas.width,canvas.height); downloadBlob(new Blob([pdf],{type:'application/pdf'}), `${fname()}.pdf`)}
function fname(){const base=(state.invoiceNumber||'invoice').replace(/[^a-z0-9_-]+/gi,'_'); return base||'invoice'}
function createPdfWithJpeg(jpeg,pageW,pageH,imgW,imgH){const enc=new TextEncoder(), chunks=[], offsets=[0]; let len=0; const pt=s=>{const b=enc.encode(s); chunks.push(b); len+=b.length}, pb=b=>{chunks.push(b); len+=b.length}, off=()=>offsets.push(len); pt('%PDF-1.4\n%\xE2\xE3\xCF\xD3\n'); off(); pt('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n'); off(); pt('2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n'); off(); pt(`3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW.toFixed(2)} ${pageH.toFixed(2)}] /Resources << /XObject << /Im0 5 0 R >> >> /Contents 4 0 R >>\nendobj\n`); const content=`q\n${pageW.toFixed(2)} 0 0 ${pageH.toFixed(2)} 0 0 cm\n/Im0 Do\nQ\n`; off(); pt(`4 0 obj\n<< /Length ${content.length} >>\nstream\n${content}endstream\nendobj\n`); off(); pt(`5 0 obj\n<< /Type /XObject /Subtype /Image /Width ${imgW} /Height ${imgH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpeg.length} >>\nstream\n`); pb(jpeg); pt('\nendstream\nendobj\n'); const xoff=len; pt(`xref\n0 ${offsets.length}\n`); pt('0000000000 65535 f \n'); for(let i=1;i<offsets.length;i++) pt(String(offsets[i]).padStart(10,'0')+' 00000 n \n'); pt(`trailer\n<< /Size ${offsets.length} /Root 1 0 R >>\nstartxref\n${xoff}\n%%EOF`); const out=new Uint8Array(len); let p=0; chunks.forEach(c=>{out.set(c,p); p+=c.length}); return out}
$('#recipientCompanyInput').addEventListener('input',e=>{state.recipientCompany=e.target.value; renderPreview()});
$('#recipientAddressInput').addEventListener('input',e=>{state.recipientAddress=e.target.value; renderPreview()});
$('#invoiceNumberInput').addEventListener('input',e=>{state.invoiceNumber=e.target.value; renderPreview()});
$('#invoiceDateInput').addEventListener('input',e=>{state.invoiceDate=e.target.value; renderPreview()});
$('#serviceList').addEventListener('input',e=>{const id=e.target.dataset.id, role=e.target.dataset.role; if(!id||!role)return; const row=state.items.find(i=>i.id===id); if(!row)return; row[role==='desc'?'desc':'amount']=e.target.value; renderPreview()});
$('#serviceList').addEventListener('click',e=>{const btn=e.target.closest('[data-role="remove"]'); if(btn) removeItem(btn.dataset.id)});
$('#addRowBtn').addEventListener('click', addItem); $('#resetBtn').addEventListener('click', resetAll); $('#langDeBtn').addEventListener('click', ()=>{state.lang='de'; render()}); $('#langEnBtn').addEventListener('click', ()=>{state.lang='en'; render()}); $$('.currency-button').forEach(b=>b.addEventListener('click', ()=>{state.currency=b.dataset.currency; render()}));
$('#downloadPngBtn').addEventListener('click', async()=>{try{await exportPng()}catch(err){alert(text[state.lang].exportError); console.error(err)}});
$('#downloadPdfBtn').addEventListener('click', async()=>{try{await exportPdf()}catch(err){alert(text[state.lang].exportError); console.error(err)}});
window.addEventListener('load', ()=>{$('#invoiceDateInput').value=state.invoiceDate; render(); syncHeaderHeight()}); window.addEventListener('resize', syncHeaderHeight); window.addEventListener('orientationchange', syncHeaderHeight); if('ResizeObserver' in window){const ro=new ResizeObserver(syncHeaderHeight); ro.observe(document.body); ro.observe($('#appHeader'))}

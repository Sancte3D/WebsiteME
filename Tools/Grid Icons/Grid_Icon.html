
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Logo Grid Fill Tool v5</title>
<style>
  :root{
    --bg:#eceae6;
    --panel:#f4f2ee;
    --surface:#efede9;
    --line:#c8c3bb;
    --line-strong:#b5b0a8;
    --text:#161616;
    --muted:#6f6a63;
    --shadow:0 1px 0 rgba(0,0,0,.03), 0 10px 24px rgba(0,0,0,.04);
    --radius:22px;
    --control-h:42px;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
  body{overflow:hidden}
  button,input,select{font:inherit}
  .app{
    display:grid;
    grid-template-columns:272px minmax(0,1fr) 300px;
    grid-template-rows:68px minmax(0,1fr);
    height:100dvh;
  }
  .topbar{
    grid-column:1/-1;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:14px 18px;
    border-bottom:1px solid rgba(0,0,0,.06);
    background:rgba(244,242,238,.84);
    backdrop-filter:blur(10px);
  }
  .title-wrap{display:flex;align-items:center;gap:12px;min-width:0}
  .title{font-size:25px;font-weight:650;letter-spacing:-.03em}
  .meta{display:flex;gap:8px;flex-wrap:wrap}
  .chip{
    display:inline-flex;align-items:center;height:34px;padding:0 12px;border-radius:999px;
    border:1px solid rgba(0,0,0,.06);background:var(--panel);
    color:var(--muted);font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
    white-space:nowrap;
  }
  .top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .sidebar{
    min-height:0;overflow:auto;padding:16px;
    border-right:1px solid rgba(0,0,0,.06);
  }
  .sidebar.right{
    border-right:none;border-left:1px solid rgba(0,0,0,.06);
  }
  .workspace{
    min-width:0;min-height:0;padding:18px;
    display:flex;flex-direction:column;gap:14px;
  }
  .toolbar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    background:var(--panel);border:1px solid rgba(0,0,0,.06);border-radius:24px;padding:12px 14px;
  }
  .toolbar-left,.toolbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .panel{
    background:var(--panel);
    border:1px solid rgba(0,0,0,.06);
    border-radius:24px;
    box-shadow:var(--shadow);
    padding:14px;
    overflow:hidden;
  }
  .panel + .panel{margin-top:12px}
  .panel-title{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    margin-bottom:12px;
  }
  .eyebrow{
    font-size:11px;font-weight:650;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)
  }
  .small{font-size:12px;color:var(--muted);line-height:1.45}
  .btn{
    height:var(--control-h);
    min-width:42px;
    padding:0 14px;
    border-radius:16px;
    border:1px solid rgba(0,0,0,.08);
    background:var(--surface);
    color:var(--text);
    font-size:14px;font-weight:550;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    cursor:pointer;
    white-space:nowrap;
    transition:transform .12s ease, background .12s ease, color .12s ease, border-color .12s ease;
  }
  .btn:hover{transform:translateY(-1px)}
  .btn.active{
    background:#111;color:#fff;border-color:#111;
  }
  .btn.subtle{background:transparent}
  .btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tool-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
  .mode-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
  .tool-btn{
    min-height:72px;padding:10px 6px;border-radius:20px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    border:1px solid rgba(0,0,0,.08);background:var(--surface);cursor:pointer;
    color:var(--text);
  }
  .tool-btn.active{background:#111;color:#fff;border-color:#111}
  .tool-icon{width:26px;height:26px;display:block}
  .tool-label{font-size:13px;font-weight:550}
  .field{display:grid;gap:7px}
  .field label{font-size:11px;color:var(--muted);font-weight:650;letter-spacing:.16em;text-transform:uppercase}
  .field select,.field input[type="range"]{
    width:100%;
  }
  .field select{
    height:var(--control-h);border-radius:15px;border:1px solid rgba(0,0,0,.08);
    background:var(--surface);padding:0 12px;color:var(--text);font-weight:550;
  }
  .field input[type="range"]{accent-color:#111}
  .canvas-shell{
    flex:1;min-height:0;min-width:0;padding:18px;border-radius:30px;
    background:var(--panel);border:1px solid rgba(0,0,0,.06);
    display:flex;
  }
  .canvas-wrap{
    flex:1;min-width:0;min-height:0;position:relative;overflow:hidden;border-radius:24px;
    background:#efede9;border:1px solid rgba(0,0,0,.06);
  }
  svg{width:100%;height:100%;display:block;touch-action:none}
  .stat{
    display:inline-flex;align-items:center;height:34px;padding:0 12px;border-radius:999px;
    border:1px solid rgba(0,0,0,.06);background:var(--surface);
    font-size:13px;font-weight:550;color:var(--text);white-space:nowrap;
  }
  .legend{display:flex;gap:8px;flex-wrap:wrap}
  .hr{height:1px;background:rgba(0,0,0,.06);margin:12px 0}
  .tooltip{
    position:fixed;z-index:9999;pointer-events:none;
    background:#111;color:#fff;padding:8px 10px;border-radius:12px;
    font-size:12px;font-weight:650;line-height:1.3;max-width:240px;
    opacity:0;transform:translateY(4px);transition:opacity .12s ease, transform .12s ease;
  }
  .tooltip.show{opacity:1;transform:translateY(0)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:6px;padding:1px 6px;color:var(--text)}
  .corners-outline{fill:none;stroke:#ff00c8;stroke-width:1.6;stroke-dasharray:6 4;vector-effect:non-scaling-stroke;pointer-events:none}
  .corner-line{stroke:rgba(255,0,200,.5);stroke-width:1;stroke-dasharray:3 3;vector-effect:non-scaling-stroke;pointer-events:none}
  .corner-handle{fill:#fff;stroke:#ff00c8;stroke-width:2;vector-effect:non-scaling-stroke;cursor:grab;transition:fill .12s ease}
  .corner-handle.override{fill:#ff00c8}
  .corner-handle.active{fill:#ff00c8;stroke:#ff00c8;cursor:grabbing}
  .corner-readout{fill:#ff00c8;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:600;pointer-events:none;paint-order:stroke;stroke:#fff;stroke-width:4px;stroke-linejoin:round}
  .linkish{background:none;border:none;color:var(--muted);font:600 11px system-ui;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;padding:0}
  .linkish:hover{color:var(--text)}
  @media (max-width: 1280px){
    .app{grid-template-columns:252px minmax(0,1fr) 284px}
    .mode-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title-wrap">
      <div class="title">Grid Fill Tool</div>
      <div class="meta">
        <div class="chip" id="topMode">Paint · Cross</div>
        <div class="chip" id="topGrid">16 × 16</div>
        <div class="chip" id="topRadius">Radius 0</div>
      </div>
    </div>
    <div class="top-actions">
      <button class="btn subtle" id="undoBtn" data-tip="Undo (⌘Z)">Undo</button>
      <button class="btn subtle" id="redoBtn" data-tip="Redo (⌘⇧Z)">Redo</button>
      <button class="btn subtle" id="clearBtn" data-tip="Clear all cells">Clear</button>
    </div>
  </div>

  <aside class="sidebar left">
    <div class="panel">
      <div class="panel-title">
        <div class="eyebrow">Tool</div>
        <div class="small mono">B / E / R</div>
      </div>
      <div class="tool-grid" id="toolGrid"></div>
      <div class="small" style="margin-top:10px;">Hold <b>Alt</b> to erase while painting.</div>
    </div>

    <div class="panel">
      <div class="panel-title">
        <div class="eyebrow">Cell style</div>
        <div class="small mono">1 – 6</div>
      </div>
      <div class="mode-grid" id="modeGrid"></div>
    </div>
  </aside>

  <main class="workspace">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="stat" id="toolStatus">Paint · Cross</div>
        <div class="stat" id="fillStatus">0 filled</div>
      </div>
      <div class="toolbar-right">
        <button class="btn" id="fitBtn" data-tip="Fit the grid in the viewport">Fit</button>
        <button class="btn" id="zoomOutBtn" data-tip="Zoom out">−</button>
        <button class="btn" id="zoomInBtn" data-tip="Zoom in">+</button>
      </div>
    </div>

    <div class="canvas-shell">
      <div class="canvas-wrap">
        <svg id="boardSvg" aria-label="grid board">
          <g id="camera">
            <g id="boardLayer">
              <rect id="boardFrame" x="0" y="0" width="1000" height="1000" fill="none" stroke="rgba(0,0,0,.10)" stroke-width="1.2"></rect>
              <g id="fillLayer"></g>
              <g id="gridLayer"></g>
              <g id="handleLayer"></g>
              <g id="hoverLayer"></g>
            </g>
          </g>
        </svg>
      </div>
    </div>
  </main>

  <aside class="sidebar right">
    <div class="panel">
      <div class="panel-title"><div class="eyebrow">Grid</div></div>
      <div class="field">
        <label>Size</label>
        <select id="gridSizeSelect" data-tip="Choose the square grid size">
          <option value="8">8 × 8</option>
          <option value="16" selected>16 × 16</option>
          <option value="32">32 × 32</option>
        </select>
      </div>
      <div class="field" style="margin-top:10px;">
        <label>Guides opacity</label>
        <input type="range" id="gridOpacity" min="0" max="100" step="1" value="100" data-tip="Fade the construction grid">
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">
        <div class="eyebrow">Corner radius</div>
        <div class="small mono" id="radiusReadout">0</div>
      </div>
      <div class="field">
        <input type="range" id="cornerRadius" min="0" max="300" step="1" value="0" data-tip="Global radius for every corner without its own value">
      </div>
      <div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div class="small">Switch to <b>Corners</b> (<span class="mono">R</span>) to drag a radius on any individual corner.</div>
      </div>
      <div style="margin-top:10px;display:flex;justify-content:flex-end;">
        <button class="linkish" id="resetCornerOverridesBtn" data-tip="Clear all per-corner radii (keeps the global value)">Reset per-corner</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title"><div class="eyebrow">Export</div></div>
      <div class="btn-grid">
        <button class="btn" id="exportGridSvgBtn" data-tip="Export the grid + fills as SVG">SVG grid</button>
        <button class="btn" id="exportFinalSvgBtn" data-tip="Export the merged rounded shape as SVG">SVG shape</button>
      </div>
      <div style="margin-top:10px;">
        <button class="btn" id="exportPngBtn" style="width:100%;" data-tip="Export the current board as PNG">PNG</button>
      </div>
    </div>
  </aside>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
(() => {
  const NS = "http://www.w3.org/2000/svg";
  const BOARD = 1000;
  const BLACK = "#111111";
  const TOOL_DEFS = [
    {id:"fill",    label:"Paint",   tip:"Paint cell parts (B)",  icon:`<svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l9-9 3 3-9 9H6z"/><path d="M14 7l3 3"/></svg>`},
    {id:"erase",   label:"Erase",   tip:"Erase cell parts (E)", icon:`<svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l7-7 5 5-4 4H9l-3-2z"/><path d="M14 17h5"/></svg>`},
    {id:"corners", label:"Corners", tip:"Drag individual corners to round them (R)", icon:`<svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11V9a5 5 0 0 1 5-5h2"/><path d="M13 4h2a5 5 0 0 1 5 5v2"/><path d="M20 13v2a5 5 0 0 1-5 5h-2"/><path d="M11 20H9a5 5 0 0 1-5-5v-2"/></svg>`}
  ];
  const MODE_DEFS = [
    {id:"full", label:"Full", tip:"Single square", icon:`<svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4.5" y="4.5" width="15" height="15" rx="1.4"/></svg>`},
    {id:"slash", label:"Slash", tip:"Diagonal split /", icon:`<svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4.5" y="4.5" width="15" height="15" rx="1.4"/><path d="M5 19L19 5"/></svg>`},
    {id:"backslash", label:"Back", tip:"Diagonal split \\", icon:`<svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4.5" y="4.5" width="15" height="15" rx="1.4"/><path d="M5 5l14 14"/></svg>`},
    {id:"cross", label:"Cross", tip:"Four-triangle cell", icon:`<svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4.5" y="4.5" width="15" height="15" rx="1.4"/><path d="M5 5l14 14"/><path d="M5 19L19 5"/></svg>`},
    {id:"hsplit", label:"H split", tip:"Horizontal split", icon:`<svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4.5" y="4.5" width="15" height="15" rx="1.4"/><path d="M5 12h14"/></svg>`},
    {id:"vsplit", label:"V split", tip:"Vertical split", icon:`<svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4.5" y="4.5" width="15" height="15" rx="1.4"/><path d="M12 5v14"/></svg>`}
  ];

  const MODE_SHORTCUTS = {"1":"full","2":"slash","3":"backslash","4":"cross","5":"hsplit","6":"vsplit"};

  const state = {
    size:16,
    board:BOARD,
    cells:[],
    activeTool:"fill",
    activeMode:"cross",
    gridOpacity:1,
    cornerRadius:0,
    cornerOverrides:{},
    hover:null,
    hoverClientX:0,
    hoverClientY:0,
    dragging:false,
    panning:false,
    spacePanning:false,
    view:{scale:1, tx:0, ty:0},
    liveShape:null,
    altErase:false,
    draggingCorner:-1,
    history:[],
    future:[]
  };

  const el = {
    toolGrid: document.getElementById("toolGrid"),
    modeGrid: document.getElementById("modeGrid"),
    boardSvg: document.getElementById("boardSvg"),
    camera: document.getElementById("camera"),
    boardLayer: document.getElementById("boardLayer"),
    gridLayer: document.getElementById("gridLayer"),
    fillLayer: document.getElementById("fillLayer"),
    handleLayer: document.getElementById("handleLayer"),
    hoverLayer: document.getElementById("hoverLayer"),
    gridSizeSelect: document.getElementById("gridSizeSelect"),
    gridOpacity: document.getElementById("gridOpacity"),
    cornerRadius: document.getElementById("cornerRadius"),
    radiusReadout: document.getElementById("radiusReadout"),
    resetCornerOverridesBtn: document.getElementById("resetCornerOverridesBtn"),
    exportGridSvgBtn: document.getElementById("exportGridSvgBtn"),
    exportFinalSvgBtn: document.getElementById("exportFinalSvgBtn"),
    exportPngBtn: document.getElementById("exportPngBtn"),
    fitBtn: document.getElementById("fitBtn"),
    zoomInBtn: document.getElementById("zoomInBtn"),
    zoomOutBtn: document.getElementById("zoomOutBtn"),
    undoBtn: document.getElementById("undoBtn"),
    redoBtn: document.getElementById("redoBtn"),
    clearBtn: document.getElementById("clearBtn"),
    topMode: document.getElementById("topMode"),
    topGrid: document.getElementById("topGrid"),
    topRadius: document.getElementById("topRadius"),
    toolStatus: document.getElementById("toolStatus"),
    fillStatus: document.getElementById("fillStatus"),
    tooltip: document.getElementById("tooltip"),
  };

  function cloneCells(cells){
    return cells.map(row => row.map(c => ({mode:c.mode, fills:[...c.fills]})));
  }
  function allLoops(shape){
    if(!shape) return [];
    return [shape.loop, ...(shape.holes || [])];
  }
  function shapePath(shape){
    return allLoops(shape).map(roundedPath).filter(Boolean).join(" ");
  }
  function snapshot(){
    return {
      size:state.size,
      cells:cloneCells(state.cells),
      activeTool:state.activeTool,
      activeMode:state.activeMode,
      gridOpacity:state.gridOpacity,
      cornerRadius:state.cornerRadius,
      cornerOverrides:Object.assign({}, state.cornerOverrides)
    };
  }
  function restore(s){
    state.size = s.size;
    state.cells = cloneCells(s.cells);
    state.activeTool = s.activeTool;
    state.activeMode = s.activeMode;
    state.gridOpacity = s.gridOpacity;
    state.cornerRadius = s.cornerRadius || 0;
    state.cornerOverrides = Object.assign({}, s.cornerOverrides || {});
    rebuildLiveShape();
    syncControls();
    renderAll();
  }
  function cornerKey(p){
    return `${p.x.toFixed(2)},${p.y.toFixed(2)}`;
  }
  function effectiveRadius(p){
    const v = state.cornerOverrides[cornerKey(p)];
    if(typeof v === "number") return v;
    return state.cornerRadius;
  }
  function hasOverride(p){
    return typeof state.cornerOverrides[cornerKey(p)] === "number";
  }
  function pushHistory(){
    state.history.push(snapshot());
    if(state.history.length > 100) state.history.shift();
    state.future.length = 0;
  }

  function cellPartCount(mode){
    if(mode === "full") return 1;
    if(mode === "slash" || mode === "backslash" || mode === "hsplit" || mode === "vsplit") return 2;
    return 4;
  }
  function makeCell(mode){
    return {mode, fills:new Array(cellPartCount(mode)).fill(false)};
  }
  function initCells(){
    state.cells = [];
    for(let y=0;y<state.size;y++){
      const row = [];
      for(let x=0;x<state.size;x++) row.push(makeCell(state.activeMode));
      state.cells.push(row);
    }
    state.liveShape = null;
  }
  function boardCellSize(){ return state.board / state.size; }

  function setTool(id){
    if(!TOOL_DEFS.find(t => t.id === id)) return;
    const prev = state.activeTool;
    state.activeTool = id;
    if(id === "corners"){
      state.hover = null;
    } else if(prev === "corners"){
      state.draggingCorner = -1;
    }
    renderToolButtons();
    renderCornerHandles();
    renderHover();
    updateStatus();
  }
  function setMode(id, opts){
    if(!MODE_DEFS.find(m => m.id === id)) return;
    state.activeMode = id;
    if(opts && opts.retintHover && state.hover){
      state.hover = hitCellAtClient(state.hoverClientX, state.hoverClientY);
      renderHover();
    }
    renderModeButtons();
    updateStatus();
  }
  function renderToolButtons(){
    el.toolGrid.innerHTML = "";
    TOOL_DEFS.forEach(def => {
      const b = document.createElement("button");
      b.className = "tool-btn" + (state.activeTool === def.id ? " active" : "");
      b.dataset.tip = def.tip;
      b.innerHTML = `${def.icon}<div class="tool-label">${def.label}</div>`;
      b.addEventListener("click", () => setTool(def.id));
      el.toolGrid.appendChild(b);
    });
  }
  function renderModeButtons(){
    el.modeGrid.innerHTML = "";
    MODE_DEFS.forEach(def => {
      const b = document.createElement("button");
      b.className = "tool-btn" + (state.activeMode === def.id ? " active" : "");
      b.dataset.tip = def.tip;
      b.innerHTML = `${def.icon}<div class="tool-label">${def.label}</div>`;
      b.addEventListener("click", () => setMode(def.id, {retintHover:true}));
      el.modeGrid.appendChild(b);
    });
  }
  function syncControls(){
    el.gridSizeSelect.value = String(state.size);
    el.gridOpacity.value = String(Math.round(state.gridOpacity*100));
    el.cornerRadius.value = String(Math.round(state.cornerRadius));
    renderToolButtons();
    renderModeButtons();
    updateStatus();
  }

  function toolLabel(){
    const t = TOOL_DEFS.find(t => t.id === state.activeTool);
    const m = MODE_DEFS.find(m => m.id === state.activeMode);
    if(state.activeTool === "fill") return `Paint · ${m ? m.label : ""}`;
    return t ? t.label : "Paint";
  }
  function overrideCount(){
    return Object.keys(state.cornerOverrides).length;
  }
  function updateStatus(){
    el.topMode.textContent = toolLabel();
    el.topGrid.textContent = `${state.size} × ${state.size}`;
    const ov = overrideCount();
    el.topRadius.textContent = ov > 0
      ? `Radius ${Math.round(state.cornerRadius)} · ${ov} custom`
      : `Radius ${Math.round(state.cornerRadius)}`;
    el.toolStatus.textContent = toolLabel();
    el.fillStatus.textContent = `${countFilledParts()} filled`;
    el.radiusReadout.textContent = String(Math.round(state.cornerRadius));
    if(el.resetCornerOverridesBtn){
      el.resetCornerOverridesBtn.disabled = ov === 0;
      el.resetCornerOverridesBtn.style.opacity = ov === 0 ? "0.45" : "1";
      el.resetCornerOverridesBtn.style.cursor = ov === 0 ? "default" : "pointer";
    }
  }
  function countFilledParts(){
    let n = 0;
    state.cells.forEach(row => row.forEach(cell => cell.fills.forEach(v => { if(v) n++; })));
    return n;
  }

  function partPolygon(mode, part, x, y, s){
    const x0 = x*s, y0 = y*s, x1 = x0+s, y1 = y0+s, cx = x0+s/2, cy = y0+s/2;
    if(mode === "full") return [[x0,y0],[x1,y0],[x1,y1],[x0,y1]];
    if(mode === "slash") return part===0 ? [[x0,y0],[x1,y0],[x0,y1]] : [[x1,y0],[x1,y1],[x0,y1]];
    if(mode === "backslash") return part===0 ? [[x0,y0],[x1,y0],[x1,y1]] : [[x0,y0],[x1,y1],[x0,y1]];
    if(mode === "hsplit") return part===0 ? [[x0,y0],[x1,y0],[x1,cy],[x0,cy]] : [[x0,cy],[x1,cy],[x1,y1],[x0,y1]];
    if(mode === "vsplit") return part===0 ? [[x0,y0],[cx,y0],[cx,y1],[x0,y1]] : [[cx,y0],[x1,y0],[x1,y1],[cx,y1]];
    if(part===0) return [[x0,y0],[x1,y0],[cx,cy]];
    if(part===1) return [[x1,y0],[x1,y1],[cx,cy]];
    if(part===2) return [[x1,y1],[x0,y1],[cx,cy]];
    return [[x0,y1],[x0,y0],[cx,cy]];
  }
  function partAtLocal(mode, u, v){
    if(u<0 || v<0 || u>1 || v>1) return null;
    if(mode === "full") return 0;
    if(mode === "slash") return v <= 1-u ? 0 : 1;
    if(mode === "backslash") return v <= u ? 0 : 1;
    if(mode === "hsplit") return v <= .5 ? 0 : 1;
    if(mode === "vsplit") return u <= .5 ? 0 : 1;
    const dx = u - .5, dy = v - .5;
    if(Math.abs(dx) > Math.abs(dy)) return dx > 0 ? 1 : 3;
    return dy > 0 ? 2 : 0;
  }

  function renderGrid(){
    el.gridLayer.innerHTML = "";
    const s = boardCellSize();
    const strokeW = Math.max(0.8, 1.15 * (16 / state.size));
    const opacity = state.gridOpacity.toFixed(2);
    if(state.gridOpacity <= 0.001) return;
    for(let y=0;y<state.size;y++){
      for(let x=0;x<state.size;x++){
        const cell = state.cells[y][x];
        const g = document.createElementNS(NS, "g");
        g.setAttribute("transform", `translate(${x*s} ${y*s})`);
        g.setAttribute("stroke", "#b7b2aa");
        g.setAttribute("stroke-opacity", opacity);
        g.setAttribute("stroke-width", strokeW.toFixed(2));
        g.setAttribute("fill", "none");
        const rect = document.createElementNS(NS, "rect");
        rect.setAttribute("x", 0); rect.setAttribute("y", 0);
        rect.setAttribute("width", s); rect.setAttribute("height", s);
        g.appendChild(rect);
        const addLine = d => {
          const p = document.createElementNS(NS, "path");
          p.setAttribute("d", d);
          g.appendChild(p);
        };
        if(cell.mode === "slash") addLine(`M0 ${s} L${s} 0`);
        else if(cell.mode === "backslash") addLine(`M0 0 L${s} ${s}`);
        else if(cell.mode === "cross"){ addLine(`M0 0 L${s} ${s}`); addLine(`M0 ${s} L${s} 0`); }
        else if(cell.mode === "hsplit") addLine(`M0 ${s/2} L${s} ${s/2}`);
        else if(cell.mode === "vsplit") addLine(`M${s/2} 0 L${s/2} ${s}`);
        el.gridLayer.appendChild(g);
      }
    }
  }
  function renderFills(){
    el.fillLayer.innerHTML = "";
    if(!state.liveShape) return;
    const path = document.createElementNS(NS, "path");
    path.setAttribute("d", shapePath(state.liveShape));
    path.setAttribute("fill", BLACK);
    path.setAttribute("fill-rule", "evenodd");
    el.fillLayer.appendChild(path);
  }
  function renderHover(){
    el.hoverLayer.innerHTML = "";
    if(!state.hover || state.activeTool === "corners") return;
    const {x,y,part,mode} = state.hover;
    if(x<0 || y<0 || x>=state.size || y>=state.size || part == null) return;
    const erasing = state.activeTool === "erase" || state.altErase;
    const poly = document.createElementNS(NS, "polygon");
    poly.setAttribute("points", partPolygon(mode, part, x, y, boardCellSize()).map(([px,py]) => `${px},${py}`).join(" "));
    poly.setAttribute("fill", erasing ? "rgba(220,60,60,.16)" : "rgba(17,17,17,.14)");
    poly.setAttribute("stroke", erasing ? "rgba(220,60,60,.65)" : "rgba(17,17,17,.55)");
    poly.setAttribute("stroke-width", (1 / state.view.scale).toFixed(2));
    el.hoverLayer.appendChild(poly);
  }


  function normalizePoint(p){
    return {x:Math.round(p[0]*1000)/1000, y:Math.round(p[1]*1000)/1000};
  }
  function polygonAreaRaw(poly){
    let a = 0;
    for(let i=0;i<poly.length;i++){
      const p = poly[i], q = poly[(i+1)%poly.length];
      a += p[0]*q[1] - q[0]*p[1];
    }
    return a/2;
  }
  function loopArea(loop){
    let a = 0;
    for(let i=0;i<loop.length;i++){
      const p = loop[i], q = loop[(i+1)%loop.length];
      a += p.x*q.y - q.x*p.y;
    }
    return a/2;
  }
  function simplifyLoop(loop){
    const n = loop.length;
    if(n < 3) return loop;
    const out = [];
    for(let i=0;i<n;i++){
      const prev = loop[(i-1+n)%n], curr = loop[i], next = loop[(i+1)%n];
      const vx1 = curr.x - prev.x, vy1 = curr.y - prev.y;
      const vx2 = next.x - curr.x, vy2 = next.y - curr.y;
      const cross = vx1*vy2 - vy1*vx2;
      if(Math.abs(cross) > 1e-3) out.push({x:curr.x, y:curr.y, r:curr.r||0});
    }
    return out.length >= 3 ? out : loop.map(p => ({x:p.x, y:p.y, r:p.r||0}));
  }
  function buildBoundaryLoops(){
    const s = boardCellSize();
    const edgeMap = new Map();

    function ptKey(p){ return `${p.x.toFixed(3)},${p.y.toFixed(3)}`; }
    function edgeKey(a,b){
      const ka = ptKey(a), kb = ptKey(b);
      return ka < kb ? `${ka}|${kb}` : `${kb}|${ka}`;
    }

    for(let y=0;y<state.size;y++){
      for(let x=0;x<state.size;x++){
        const cell = state.cells[y][x];
        for(let part=0; part<cell.fills.length; part++){
          if(!cell.fills[part]) continue;
          let poly = partPolygon(cell.mode, part, x, y, s).map(normalizePoint);
          if(polygonAreaRaw(poly) < 0) poly = poly.reverse();
          for(let i=0;i<poly.length;i++){
            const a = poly[i], b = poly[(i+1)%poly.length];
            const k = edgeKey(a,b);
            if(edgeMap.has(k)){
              edgeMap.delete(k);
            } else {
              edgeMap.set(k, {a,b});
            }
          }
        }
      }
    }

    const edges = [...edgeMap.values()];
    const byStart = new Map();
    function addStart(a, idx){
      const k = ptKey(a);
      if(!byStart.has(k)) byStart.set(k, []);
      byStart.get(k).push(idx);
    }
    edges.forEach((e, idx)=> addStart(e.a, idx));

    const used = new Set();
    const loops = [];

    for(let i=0;i<edges.length;i++){
      if(used.has(i)) continue;
      used.add(i);
      const loop = [{...edges[i].a}, {...edges[i].b}];
      let current = edges[i].b;
      let guard = 0;
      while(guard++ < 100000){
        const refs = byStart.get(ptKey(current)) || [];
        let found = null;
        for(const idx of refs){
          if(!used.has(idx)){ found = idx; break; }
        }
        if(found == null) break;
        used.add(found);
        const next = edges[found];
        current = next.b;
        if(Math.hypot(current.x - loop[0].x, current.y - loop[0].y) < 0.001) break;
        loop.push({...current});
      }
      if(loop.length > 2) loops.push(loop);
    }

    return loops
      .map(loop => simplifyLoop(loop))
      .filter(loop => loop.length >= 3)
      .sort((a,b) => Math.abs(loopArea(b)) - Math.abs(loopArea(a)));
  }
  function rebuildLiveShape(){
    const loops = buildBoundaryLoops();
    if(!loops.length){ state.liveShape = null; return; }
    const normalized = loops.map(l => l.map(p => ({x:p.x, y:p.y})));
    state.liveShape = {loop: normalized[0], holes: normalized.slice(1)};
  }

  function roundedPath(loop){
    if(!loop || loop.length < 2) return "";
    const n = loop.length;
    let d = "";
    for(let i=0;i<n;i++){
      const prev = loop[(i-1+n)%n], curr = loop[i], next = loop[(i+1)%n];
      const maxR = Math.min(dist(curr, prev)*0.5, dist(curr, next)*0.5);
      const r = Math.min(Math.max(0, effectiveRadius(curr)), maxR);
      if(r <= .01){
        d += (i===0 ? "M " : "L ") + `${curr.x.toFixed(2)} ${curr.y.toFixed(2)} `;
        continue;
      }
      const inVec = normalize({x:prev.x-curr.x, y:prev.y-curr.y});
      const outVec = normalize({x:next.x-curr.x, y:next.y-curr.y});
      const p1 = {x: curr.x + inVec.x*r, y: curr.y + inVec.y*r};
      const p2 = {x: curr.x + outVec.x*r, y: curr.y + outVec.y*r};
      d += (i===0 ? "M " : "L ") + `${p1.x.toFixed(2)} ${p1.y.toFixed(2)} `;
      d += `Q ${curr.x.toFixed(2)} ${curr.y.toFixed(2)} ${p2.x.toFixed(2)} ${p2.y.toFixed(2)} `;
    }
    d += "Z";
    return d;
  }
  function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
  function normalize(v){
    const d = Math.hypot(v.x,v.y) || 1;
    return {x:v.x/d,y:v.y/d};
  }

  function renderAll(){
    renderFills();
    renderGrid();
    renderCornerHandles();
    renderHover();
    updateStatus();
    applyCamera();
  }

  function cornerBasis(loop, i){
    const n = loop.length;
    const prev = loop[(i-1+n)%n], curr = loop[i], next = loop[(i+1)%n];
    const inVec = normalize({x:prev.x-curr.x, y:prev.y-curr.y});
    const outVec = normalize({x:next.x-curr.x, y:next.y-curr.y});
    const sum = {x:inVec.x+outVec.x, y:inVec.y+outVec.y};
    const m = Math.hypot(sum.x, sum.y);
    const bis = m > 1e-6 ? {x:sum.x/m, y:sum.y/m} : {x:-outVec.y, y:outVec.x};
    const maxR = Math.min(dist(curr, prev)*0.5, dist(curr, next)*0.5);
    return {prev, curr, next, bis, maxR};
  }
  function cornerHandlePos(loop, i){
    const b = cornerBasis(loop, i);
    const r = Math.min(Math.max(0, effectiveRadius(b.curr)), b.maxR);
    const baseScreen = 10 / state.view.scale;
    const off = Math.max(baseScreen, r);
    return {x: b.curr.x + b.bis.x * off, y: b.curr.y + b.bis.y * off, r, basis:b};
  }
  function hitCornerHandle(world){
    if(state.activeTool !== "corners" || !state.liveShape) return -1;
    const tol = 12 / state.view.scale;
    const loop = state.liveShape.loop;
    let bestIdx = -1, bestD = Infinity;
    for(let i=0;i<loop.length;i++){
      const h = cornerHandlePos(loop, i);
      const d = Math.hypot(world.x - h.x, world.y - h.y);
      if(d <= tol && d < bestD){ bestD = d; bestIdx = i; }
    }
    return bestIdx;
  }
  function renderCornerHandles(){
    el.handleLayer.innerHTML = "";
    if(state.activeTool !== "corners" || !state.liveShape) return;
    const outline = document.createElementNS(NS, "path");
    outline.setAttribute("d", shapePath(state.liveShape));
    outline.setAttribute("class", "corners-outline");
    outline.setAttribute("fill-rule", "evenodd");
    el.handleLayer.appendChild(outline);

    const loop = state.liveShape.loop;
    const handleR = 6 / state.view.scale;
    for(let i=0;i<loop.length;i++){
      const h = cornerHandlePos(loop, i);
      const curr = h.basis.curr;
      const line = document.createElementNS(NS, "line");
      line.setAttribute("x1", curr.x.toFixed(2));
      line.setAttribute("y1", curr.y.toFixed(2));
      line.setAttribute("x2", h.x.toFixed(2));
      line.setAttribute("y2", h.y.toFixed(2));
      line.setAttribute("class", "corner-line");
      el.handleLayer.appendChild(line);

      const c = document.createElementNS(NS, "circle");
      c.setAttribute("cx", h.x.toFixed(2));
      c.setAttribute("cy", h.y.toFixed(2));
      c.setAttribute("r", handleR.toFixed(2));
      let cls = "corner-handle";
      if(hasOverride(curr)) cls += " override";
      if(state.draggingCorner === i) cls += " active";
      c.setAttribute("class", cls);
      el.handleLayer.appendChild(c);

      if(state.draggingCorner === i){
        const t = document.createElementNS(NS, "text");
        const pad = 16 / state.view.scale;
        t.setAttribute("x", (h.x + h.basis.bis.x * pad).toFixed(2));
        t.setAttribute("y", (h.y + h.basis.bis.y * pad).toFixed(2));
        t.setAttribute("class", "corner-readout");
        t.setAttribute("text-anchor", "middle");
        t.setAttribute("dominant-baseline", "middle");
        t.setAttribute("font-size", (13 / state.view.scale).toFixed(2));
        t.textContent = Math.round(h.r);
        el.handleLayer.appendChild(t);
      }
    }
  }

  function hitCell(world){
    const s = boardCellSize();
    const x = Math.floor(world.x / s), y = Math.floor(world.y / s);
    if(x < 0 || y < 0 || x >= state.size || y >= state.size) return null;
    const u = (world.x - x*s) / s, v = (world.y - y*s) / s;
    const cell = state.cells[y][x];
    const mode = state.activeTool === "fill" ? state.activeMode : cell.mode;
    const part = partAtLocal(mode, u, v);
    return {x,y,part,mode};
  }
  function hitCellAtClient(clientX, clientY){
    const pt = el.boardSvg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    const world = pt.matrixTransform(el.camera.getScreenCTM().inverse());
    return hitCell(world);
  }
  function cellFillRatio(cell){
    const n = cell.fills.length;
    if(!n) return 0;
    let f = 0;
    for(const v of cell.fills) if(v) f++;
    return f / n;
  }
  function applyTool(hit){
    if(!hit || hit.part == null) return false;
    const cell = state.cells[hit.y][hit.x];
    const erasing = state.activeTool === "erase" || state.altErase;
    if(erasing){
      if(hit.part >= cell.fills.length) return false;
      if(!cell.fills[hit.part]) return false;
      cell.fills[hit.part] = false;
      return true;
    }
    if(cell.mode !== hit.mode){
      const prevRatio = cellFillRatio(cell);
      cell.mode = hit.mode;
      cell.fills = new Array(cellPartCount(cell.mode)).fill(prevRatio >= 1);
    }
    if(hit.part >= cell.fills.length) return false;
    if(cell.fills[hit.part]) return false;
    cell.fills[hit.part] = true;
    return true;
  }

  function pointerToWorld(evt){
    const pt = el.boardSvg.createSVGPoint();
    pt.x = evt.clientX; pt.y = evt.clientY;
    return pt.matrixTransform(el.camera.getScreenCTM().inverse());
  }
  const MIN_ZOOM = 0.15;
  const MAX_ZOOM = 8;
  function clampZoom(s){ return Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, s)); }
  function fitView(){
    const rect = el.boardSvg.getBoundingClientRect();
    const pad = 56;
    const scale = Math.min((rect.width - pad) / state.board, (rect.height - pad) / state.board);
    state.view.scale = clampZoom(scale);
    state.view.tx = (rect.width - state.board * state.view.scale) / 2;
    state.view.ty = (rect.height - state.board * state.view.scale) / 2;
    applyCamera();
  }
  function recenterAtCurrentZoom(){
    const rect = el.boardSvg.getBoundingClientRect();
    state.view.tx = (rect.width - state.board * state.view.scale) / 2;
    state.view.ty = (rect.height - state.board * state.view.scale) / 2;
    applyCamera();
  }
  function zoomCentered(factor){
    state.view.scale = clampZoom(state.view.scale * factor);
    recenterAtCurrentZoom();
    renderHover();
    renderCornerHandles();
  }
  function applyCamera(){
    el.camera.setAttribute("transform", `translate(${state.view.tx} ${state.view.ty}) scale(${state.view.scale})`);
  }

  function exportGridSvg(){
    const s = boardCellSize();
    const strokeW = Math.max(.8, 1.15 * (16 / state.size)).toFixed(2);
    const shape = state.liveShape;
    let out = `<rect width="${state.board}" height="${state.board}" fill="#efede9"/>`;
    if(shape) out += `<path d="${shapePath(shape)}" fill="${BLACK}" fill-rule="evenodd"/>`;
    out += `<g stroke="#b7b2aa" stroke-opacity="${state.gridOpacity}" stroke-width="${strokeW}" fill="none">`;
    state.cells.forEach((row,y)=>row.forEach((cell,x)=>{
      const x0 = x*s, y0 = y*s;
      out += `<rect x="${x0}" y="${y0}" width="${s}" height="${s}"/>`;
      if(cell.mode==="slash") out += `<path d="M${x0} ${y0+s} L${x0+s} ${y0}"/>`;
      else if(cell.mode==="backslash") out += `<path d="M${x0} ${y0} L${x0+s} ${y0+s}"/>`;
      else if(cell.mode==="cross") out += `<path d="M${x0} ${y0} L${x0+s} ${y0+s}"/><path d="M${x0} ${y0+s} L${x0+s} ${y0}"/>`;
      else if(cell.mode==="hsplit") out += `<path d="M${x0} ${y0+s/2} L${x0+s} ${y0+s/2}"/>`;
      else if(cell.mode==="vsplit") out += `<path d="M${x0+s/2} ${y0} L${x0+s/2} ${y0+s}"/>`;
    }));
    out += `</g>`;
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${state.board} ${state.board}" width="${state.board}" height="${state.board}">${out}</svg>`;
    downloadBlob(new Blob([svg], {type:"image/svg+xml;charset=utf-8"}), "logo_grid.svg");
  }
  function exportFinalSvg(){
    const shape = state.liveShape;
    const body = shape ? `<path d="${shapePath(shape)}" fill="${BLACK}" fill-rule="evenodd"/>` : "";
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${state.board} ${state.board}" width="${state.board}" height="${state.board}">${body}</svg>`;
    downloadBlob(new Blob([svg], {type:"image/svg+xml;charset=utf-8"}), "logo_shape.svg");
  }
  function exportPng(){
    const scale = 2;
    const canvas = document.createElement("canvas");
    canvas.width = state.board * scale; canvas.height = state.board * scale;
    const ctx = canvas.getContext("2d");
    ctx.scale(scale, scale);
    ctx.fillStyle = "#efede9";
    ctx.fillRect(0, 0, state.board, state.board);
    const shape = state.liveShape;
    if(shape){
      ctx.fillStyle = BLACK;
      ctx.beginPath();
      allLoops(shape).forEach(loop => drawRounded(ctx, loop));
      ctx.fill("evenodd");
    }
    canvas.toBlob(blob => downloadBlob(blob, "logo.png"), "image/png");
  }
  function drawRounded(ctx, loop){
    const n = loop.length;
    if(n < 2) return;
    for(let i=0;i<n;i++){
      const prev = loop[(i-1+n)%n], curr = loop[i], next = loop[(i+1)%n];
      const maxR = Math.min(dist(curr, prev)*0.5, dist(curr, next)*0.5);
      const r = Math.min(Math.max(0, effectiveRadius(curr)), maxR);
      if(r <= .01){
        if(i===0) ctx.moveTo(curr.x, curr.y); else ctx.lineTo(curr.x, curr.y);
        continue;
      }
      const inVec = normalize({x:prev.x-curr.x, y:prev.y-curr.y});
      const outVec = normalize({x:next.x-curr.x, y:next.y-curr.y});
      const p1 = {x: curr.x + inVec.x*r, y: curr.y + inVec.y*r};
      const p2 = {x: curr.x + outVec.x*r, y: curr.y + outVec.y*r};
      if(i===0) ctx.moveTo(p1.x, p1.y); else ctx.lineTo(p1.x, p1.y);
      ctx.quadraticCurveTo(curr.x, curr.y, p2.x, p2.y);
    }
    ctx.closePath();
  }
  function downloadBlob(blob, name){
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  }

  function installTooltips(){
    document.addEventListener("pointerover", e => {
      const t = e.target.closest("[data-tip]");
      if(!t) return;
      el.tooltip.textContent = t.dataset.tip;
      el.tooltip.classList.add("show");
    });
    document.addEventListener("pointermove", e => {
      if(!el.tooltip.classList.contains("show")) return;
      el.tooltip.style.left = `${e.clientX + 14}px`;
      el.tooltip.style.top = `${e.clientY + 14}px`;
    });
    document.addEventListener("pointerout", e => {
      if(e.target.closest("[data-tip]")) el.tooltip.classList.remove("show");
    });
  }

  function bindUI(){
    el.gridSizeSelect.addEventListener("change", () => {
      pushHistory();
      state.size = parseInt(el.gridSizeSelect.value, 10);
      state.cornerOverrides = {};
      initCells();
      rebuildLiveShape();
      fitView();
      syncControls();
      renderAll();
    });
    el.gridOpacity.addEventListener("input", () => {
      state.gridOpacity = (+el.gridOpacity.value) / 100;
      renderGrid();
    });

    let radiusSession = false;
    const commitRadius = v => {
      if(!radiusSession){ pushHistory(); radiusSession = true; }
      state.cornerRadius = Math.max(0, +v || 0);
      renderFills();
      renderCornerHandles();
      updateStatus();
    };
    el.cornerRadius.addEventListener("pointerdown", () => { radiusSession = false; });
    el.cornerRadius.addEventListener("input", () => commitRadius(el.cornerRadius.value));
    el.cornerRadius.addEventListener("change", () => { radiusSession = false; });

    el.resetCornerOverridesBtn.addEventListener("click", () => {
      if(Object.keys(state.cornerOverrides).length === 0) return;
      pushHistory();
      state.cornerOverrides = {};
      renderAll();
    });

    el.exportGridSvgBtn.addEventListener("click", exportGridSvg);
    el.exportFinalSvgBtn.addEventListener("click", exportFinalSvg);
    el.exportPngBtn.addEventListener("click", exportPng);
    el.fitBtn.addEventListener("click", fitView);
    el.zoomInBtn.addEventListener("click", () => zoomCentered(1.15));
    el.zoomOutBtn.addEventListener("click", () => zoomCentered(1/1.15));
    el.clearBtn.addEventListener("click", () => {
      pushHistory();
      state.cells.forEach(row => row.forEach(cell => cell.fills.fill(false)));
      state.liveShape = null;
      state.cornerOverrides = {};
      renderAll();
    });
    el.undoBtn.addEventListener("click", () => {
      if(!state.history.length) return;
      state.future.push(snapshot());
      restore(state.history.pop());
    });
    el.redoBtn.addEventListener("click", () => {
      if(!state.future.length) return;
      state.history.push(snapshot());
      restore(state.future.pop());
    });

    let lastPan = null;
    const isTypingTarget = t => !!(t && t.closest && t.closest("input,textarea,select,[contenteditable='true']"));
    window.addEventListener("keydown", e => {
      if(isTypingTarget(e.target)) return;
      const k = e.key.toLowerCase();
      if(e.code === "Space"){ state.spacePanning = true; e.preventDefault(); return; }
      if((e.ctrlKey || e.metaKey) && k === "z" && !e.shiftKey){ e.preventDefault(); el.undoBtn.click(); return; }
      if((e.ctrlKey || e.metaKey) && (k === "y" || (e.shiftKey && k === "z"))){ e.preventDefault(); el.redoBtn.click(); return; }
      if(MODE_SHORTCUTS[e.key]){ e.preventDefault(); setMode(MODE_SHORTCUTS[e.key], {retintHover:true}); return; }
      if(k === "b"){ e.preventDefault(); setTool("fill"); return; }
      if(k === "e"){ e.preventDefault(); setTool("erase"); return; }
      if(k === "r"){ e.preventDefault(); setTool("corners"); return; }
      if(k === "f"){ e.preventDefault(); fitView(); return; }
      if(e.key === "+" || e.key === "="){ e.preventDefault(); zoomCentered(1.15); return; }
      if(e.key === "-" || e.key === "_"){ e.preventDefault(); zoomCentered(1/1.15); return; }
    });
    window.addEventListener("keyup", e => {
      if(e.code === "Space") state.spacePanning = false;
    });
    window.addEventListener("blur", () => { state.spacePanning = false; });
    window.addEventListener("resize", () => { fitView(); renderHover(); renderCornerHandles(); });

    el.boardSvg.addEventListener("wheel", e => {
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.08 : 1/1.08;
      const rect = el.boardSvg.getBoundingClientRect();
      const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
      const prev = state.view.scale;
      const next = clampZoom(prev * factor);
      if(next === prev) return;
      const k = next / prev;
      state.view.tx = cx - (cx - state.view.tx) * k;
      state.view.ty = cy - (cy - state.view.ty) * k;
      state.view.scale = next;
      applyCamera();
      renderHover();
      renderCornerHandles();
    }, {passive:false});

    function worldAtClient(clientX, clientY){
      const pt = el.boardSvg.createSVGPoint();
      pt.x = clientX; pt.y = clientY;
      return pt.matrixTransform(el.camera.getScreenCTM().inverse());
    }

    el.boardSvg.addEventListener("pointerdown", e => {
      if(e.button === 2) return;
      if(e.button === 1 || state.spacePanning){
        state.panning = true;
        lastPan = {x:e.clientX, y:e.clientY};
        try { el.boardSvg.setPointerCapture(e.pointerId); } catch(_){}
        return;
      }
      if(state.activeTool === "corners"){
        const world = worldAtClient(e.clientX, e.clientY);
        const idx = hitCornerHandle(world);
        if(idx < 0) return;
        pushHistory();
        state.draggingCorner = idx;
        try { el.boardSvg.setPointerCapture(e.pointerId); } catch(_){}
        renderCornerHandles();
        return;
      }
      const hit = hitCellAtClient(e.clientX, e.clientY);
      state.hover = hit;
      state.hoverClientX = e.clientX; state.hoverClientY = e.clientY;
      if(!hit) return;
      pushHistory();
      state.dragging = true;
      state.altErase = e.altKey;
      try { el.boardSvg.setPointerCapture(e.pointerId); } catch(_){}
      const changed = applyTool(hit);
      if(changed) rebuildLiveShape();
      renderAll();
    });

    el.boardSvg.addEventListener("pointermove", e => {
      state.hoverClientX = e.clientX; state.hoverClientY = e.clientY;
      if(state.panning && lastPan){
        const dx = e.clientX - lastPan.x;
        const dy = e.clientY - lastPan.y;
        lastPan = {x:e.clientX, y:e.clientY};
        state.view.tx += dx;
        state.view.ty += dy;
        applyCamera();
        return;
      }
      if(state.activeTool === "corners"){
        if(state.draggingCorner >= 0 && state.liveShape){
          const loop = state.liveShape.loop;
          const i = state.draggingCorner;
          if(i < loop.length){
            const b = cornerBasis(loop, i);
            const world = worldAtClient(e.clientX, e.clientY);
            const proj = (world.x - b.curr.x) * b.bis.x + (world.y - b.curr.y) * b.bis.y;
            const r = Math.max(0, Math.min(b.maxR, proj));
            state.cornerOverrides[cornerKey(b.curr)] = r;
            renderFills();
            renderCornerHandles();
            updateStatus();
          }
        } else {
          const cur = state.draggingCorner;
          const world = worldAtClient(e.clientX, e.clientY);
          const hoverIdx = hitCornerHandle(world);
          el.boardSvg.style.cursor = hoverIdx >= 0 ? "grab" : "";
          if(hoverIdx !== cur){ /* no-op, handle hover is via CSS */ }
        }
        return;
      }
      const hit = hitCellAtClient(e.clientX, e.clientY);
      state.hover = hit;
      if(state.dragging && hit){
        if(e.altKey !== state.altErase) state.altErase = e.altKey;
        const changed = applyTool(hit);
        if(changed){ rebuildLiveShape(); renderFills(); renderGrid(); renderCornerHandles(); }
      }
      renderHover();
      updateStatus();
    });

    window.addEventListener("pointerup", e => {
      state.dragging = false;
      state.panning = false;
      state.altErase = false;
      if(state.draggingCorner >= 0){
        state.draggingCorner = -1;
        renderCornerHandles();
      }
      lastPan = null;
      el.boardSvg.style.cursor = "";
      if(e && e.pointerId != null){
        try { el.boardSvg.releasePointerCapture(e.pointerId); } catch(_){}
      }
    });
    el.boardSvg.addEventListener("pointerleave", () => {
      if(state.hover){ state.hover = null; renderHover(); }
    });
    el.boardSvg.addEventListener("contextmenu", e => e.preventDefault());
  }

  function init(){
    initCells();
    installTooltips();
    bindUI();
    syncControls();
    renderAll();
    requestAnimationFrame(fitView);
  }

  init();
})();
</script>
</body>
</html>

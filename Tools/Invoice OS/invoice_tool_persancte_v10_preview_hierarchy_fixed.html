<title>Persancte Invoice Tool</title>
<style>

*{box-sizing:border-box}

.side-head{display:flex;justify-content:space-between;align-items:center;padding:0 10px 18px;gap:14px}.tool-title{margin:0;font-size:17px;line-height:1;font-weight:600;letter-spacing:-.02em;color:var(--text-primary)}.saved{color:var(--text-tertiary);font-size:12px;font-weight:500;white-space:nowrap}.panel{padding:4px 0 14px}.panel-title{margin:0 0 9px;padding:0 10px;color:var(--text-muted);font-size:14px;font-weight:500;letter-spacing:-.01em}.field{display:grid;gap:6px;padding:0 10px 10px;min-width:0}.field span{color:var(--text-tertiary);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.035em;line-height:1.1}.field-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:6px;padding:0 10px}.field-grid>.field{padding:0 0 10px}.button,.seg,.mini-action{min-height:36px;border-radius:8px;padding:0 10px;display:flex;align-items:center;justify-content:flex-start;gap:8px;color:var(--text-muted);font-size:14px;font-weight:500;letter-spacing:-.01em;transition:background var(--spring-time) var(--spring),color var(--spring-time) var(--spring),transform 120ms ease}.button:hover,.seg:hover,.mini-action:hover{background:var(--active-pill);color:var(--text-primary)}.button:active,.seg:active,.mini-action:active{transform:scale(.97)}.button.primary,.seg.active{background:var(--active-pill);color:var(--text-primary)}.button-row,.seg-row{display:grid;gap:4px;padding:0 10px}.seg-row{grid-template-columns:repeat(3,minmax(0,1fr))}.lang-row{grid-template-columns:repeat(2,minmax(0,1fr))}.seg{text-align:left;min-width:0;justify-content:center}.button-row .button{width:100%}.service-list{display:grid;gap:10px;padding:0 6px}.service-item{position:relative;padding:8px 4px 10px;border-radius:12px;background:transparent;border:.5px solid transparent;transition:background var(--spring-time) var(--spring),border-color var(--spring-time) var(--spring),transform var(--spring-time) var(--spring)}.service-item:hover{background:var(--ghost);border-color:var(--ghost-line)}.service-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 4px 7px}.service-index{display:flex;align-items:center;gap:8px;color:var(--text-secondary);font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}.dot{width:6px;height:6px;border-radius:50%;background:var(--blue);flex:0 0 auto}.remove{width:32px;min-height:28px;border-radius:999px;color:var(--text-tertiary);font-size:13px;font-weight:700}.remove:hover{background:var(--active-pill);color:var(--text-primary)}.remove:disabled{opacity:.25;pointer-events:none}.sidebar-total{padding:2px 10px 10px;color:var(--text-secondary);font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}.hint{padding:0 10px 8px;color:var(--text-tertiary);font-size:12px;font-weight:500;line-height:1.35;letter-spacing:-.01em}

{transform:scale(.94)}.day-button.muted{color:var(--text-tertiary)}.day-button.today{box-shadow:inset 0 0 0 1px var(--glass-line);color:var(--text-primary)}.day-button.selected{background:var(--text-primary);color:var(--canvas)}.date-picker-foot{display:flex;gap:4px;padding:8px 0 0}.date-foot-button{flex:1;min-height:34px;border-radius:999px;color:var(--text-secondary);font-size:13px;font-weight:600;letter-spacing:-.01em;transition:background var(--spring-time) var(--spring),color var(--spring-time) var(--spring),transform 120ms ease}.date-foot-button:hover{background:var(--active-pill);color:var(--text-primary)}.date-foot-button:active{transform:scale(.97)}
.canvas{position:relative;min-width:0;min-height:0;overflow:auto;background-color:var(--canvas);background-image:radial-gradient(circle at 50% 0%,rgba(255,255,255,.03) 0%,transparent 70%);overscroll-behavior:none}.floating-header{position:fixed;top:18px;left:calc(300px + ((100vw - 300px)/2));transform:translateX(-50%);z-index:50;display:flex;align-items:center;gap:10px;min-height:52px;padding:6px;border-radius:9999px;background:var(--glass);backdrop-filter:blur(24px) saturate(150%);-webkit-backdrop-filter:blur(24px) saturate(150%);border:.5px solid var(--glass-line);box-shadow:0 8px 32px rgba(0,0,0,.12)}.glass-group{display:flex;align-items:center;gap:4px}.glass-chip{min-height:40px;min-width:44px;padding:0 14px;border-radius:9999px;color:var(--text-secondary);font-size:13px;font-weight:500;letter-spacing:-.01em;transition:background var(--spring-time) var(--spring),color var(--spring-time) var(--spring),transform 120ms ease}.glass-chip:hover,.glass-chip.active{background:var(--active-pill);color:var(--text-primary)}.glass-chip:active{transform:scale(.97)}.page{max-width:1100px;min-height:100vh;margin:0 auto;padding:136px 36px 88px}.canvas-head{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding-bottom:44px}.kicker,.page-no{outline:none;color:var(--text-tertiary);font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;border-radius:6px}.kicker{margin-bottom:8px}.title{outline:none;color:var(--text-primary);font-size:34px;line-height:1.05;font-weight:600;letter-spacing:-.035em;border-radius:8px}.page-no{font-variant-numeric:tabular-nums;white-space:nowrap}.preview-row{position:relative;display:grid;grid-template-columns:72px 8px minmax(0,1fr);column-gap:24px;align-items:start;margin-bottom:32px;border-top:2px solid transparent}.preview-date{min-height:28px;padding-top:7px;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--text-muted);font-size:13px;font-weight:400;letter-spacing:-.01em}.preview-date strong{color:var(--text-primary);font-size:17px;font-weight:600;letter-spacing:-.02em;margin-right:5px}.preview-node{width:8px;height:8px;margin-top:14px;border-radius:50%;border:1.5px solid var(--text-primary);background:var(--text-primary);box-shadow:0 0 12px rgba(0,0,0,.18);position:relative}.preview-node::after{content:"";position:absolute;left:50%;top:10px;width:1px;height:calc(32px + 100%);transform:translateX(-50%);background:linear-gradient(to bottom,var(--node),transparent 52%,var(--node));opacity:.12}.preview-content{position:relative;min-height:56px;padding:28px 14px 14px;border-radius:12px;background:var(--ghost);border:.5px solid var(--ghost-line);transition:background var(--spring-time) var(--spring),border-color var(--spring-time) var(--spring),transform var(--spring-time) var(--spring)}.preview-content:hover{transform:scale(1.01)}.sheet-frame{width:100%;display:grid;place-items:center}.sheet{width:min(100%,900px);aspect-ratio:210/297;background:#fff;border-radius:0;box-shadow:0 22px 70px rgba(0,0,0,.12);overflow:hidden}.sheet svg{display:block;width:100%;height:100%}.status-line{display:flex;justify-content:space-between;gap:16px;color:var(--text-tertiary);font-size:12px;font-weight:500;letter-spacing:-.01em;margin-top:12px;padding:0 2px;opacity:.82}.toast{position:fixed;left:50%;bottom:26px;z-index:100;display:flex;align-items:center;gap:10px;min-height:44px;padding:0 16px;border-radius:999px;background:var(--glass);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);border:.5px solid var(--glass-line);color:var(--text-primary);font-size:13px;font-weight:600;opacity:0;pointer-events:none;transform:translateX(-50%) translateY(10px);transition:opacity var(--spring-time) var(--spring),transform var(--spring-time) var(--spring)}.toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:900px){html,body{overflow:auto}.app{display:block;height:auto}.sidebar{border-right:0;border-bottom:.5px solid var(--sidebar-line)}.floating-header{left:50%;transform:translateX(-50%)}.page{padding:136px 22px 70px}.preview-row{grid-template-columns:58px 8px minmax(0,1fr);column-gap:18px}.side-head{padding-top:4px}.sheet{width:min(100%,760px)}}@media(max-width:560px){.floating-header{width:calc(100% - 20px);justify-content:center;flex-wrap:wrap;border-radius:24px}.glass-chip{padding:0 10px}.page{padding-top:156px}.canvas-head{display:grid}.field-grid,.seg-row,.lang-row{grid-template-columns:1fr}.preview-row{grid-template-columns:1fr}.preview-date{text-align:left;padding:0}.preview-node{display:none}.preview-content{padding:0;background:transparent;border-color:transparent}.status-line{display:grid}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:1ms!important;transition-duration:1ms!important;scroll-behavior:auto!important}}
</style>

<body>
<div class="app">
  <aside class="sidebar">
    <div class="side-head"><h1 class="tool-title">Invoice Tool</h1><span class="saved" id="saveState">Saved</span></div>
    <section class="panel">
      <p class="panel-title" data-i18n="view">View</p>
      <div class="seg-row lang-row"><button class="seg active" data-lang="de" type="button">DE</button><button class="seg" data-lang="en" type="button">EN</button></div>
      <div class="seg-row" style="margin-top:6px"><button class="seg active" data-currency="EUR" type="button">EUR</button><button class="seg" data-currency="USD" type="button">USD</button><button class="seg" data-currency="GBP" type="button">GBP</button></div>
    </section>
    <section class="panel">
      <p class="panel-title" data-i18n="recipient">Empfänger</p>
      <label class="field"><span data-i18n="company">Firma</span><input id="recipientCompany" autocomplete="organization"></label>
      <label class="field"><span data-i18n="address">Adresse</span><textarea id="recipientAddress" autocomplete="street-address"></textarea></label>
    </section>
    <section class="panel">
      <p class="panel-title" data-i18n="invoiceData">Rechnungsdaten</p>
      <label class="field"><span data-i18n="number">Rechnungsnummer</span><input id="invoiceNumber"></label>
      <div class="field-grid">
        <label class="field"><span data-i18n="invoiceDate">Rechnungsdatum</span><input id="invoiceDate" class="date-input" data-date-field="invoiceDate" inputmode="none" readonly aria-haspopup="dialog"></label>
        <label class="field"><span data-i18n="deliveryDate">Lieferdatum</span><input id="deliveryDate" class="date-input" data-date-field="deliveryDate" inputmode="none" readonly aria-haspopup="dialog"></label>
      </div>
      <label class="field"><span data-i18n="paymentDays">Zahlungsziel in Tagen</span><input id="paymentDays" inputmode="numeric"></label>
    </section>
    <section class="panel">
      <p class="panel-title" data-i18n="services">Leistungen</p>
      <div class="hint" data-i18n="descHint">Lange Texte werden in der Vorschau automatisch umbrochen.</div>
      <div class="service-list" id="serviceList"></div>
      <div class="button-row" style="margin-top:6px"><button class="button" id="addService" type="button" data-i18n="addService">Leistung hinzufügen</button></div>
      <div class="sidebar-total" id="sidebarTotal"></div>
    </section>
    <section class="panel">
      <p class="panel-title" data-i18n="export">Export</p>
      <div class="button-row"><button class="button primary" id="downloadPdf" type="button">Download PDF</button><button class="button" id="downloadPng" type="button">Download PNG</button><button class="button" id="downloadSvg" type="button">Download SVG</button><button class="button" id="resetTool" type="button" data-i18n="reset">Reset</button></div>
    </section>
  </aside>
  <main class="canvas">
    <div class="floating-header">
      <div class="glass-group"><button class="glass-chip active" id="fitButton" type="button">Preview</button><button class="glass-chip" id="downloadPdfTop" type="button">PDF</button></div>
      <div class="glass-group"><button class="glass-chip active" data-theme="light" type="button">Light</button><button class="glass-chip" data-theme="dark" type="button">Dark</button></div>
    </div>
    <div class="page">
      <header class="canvas-head">
        <div><div class="kicker">Persancte Studio</div><div class="title" id="canvasTitle">Rechnung</div></div>
        <div class="page-no" id="pageNo">A4</div>
      </header>
      <section class="preview-row">
        <div class="preview-date"><strong id="previewDay">01</strong><span id="previewMonth">Invoice</span></div>
        <div class="preview-node"></div>
        <div class="preview-content">
          <div class="sheet-frame"><div class="sheet" id="sheetPreview"></div></div>
          <div class="status-line"><span id="statusLeft">Live preview</span><span id="statusRight">No text overlap</span></div>
        </div>
      </section>
    </div>
  </main>
</div>
<div class="date-popover" id="datePicker" role="dialog" aria-label="Date picker"></div>
<div class="toast" id="toast">Saved</div>
<script>
const $=(selector,root=document)=>root.querySelector(selector);
const $$=(selector,root=document)=>Array.from(root.querySelectorAll(selector));
const today=new Date().toISOString().slice(0,10);
const initial={theme:"light",lang:"de",currency:"EUR",recipientCompany:"",recipientAddress:"",invoiceNumber:"2026-001",invoiceDate:today,deliveryDate:today,paymentDays:"14",items:[{id:id(),desc:"3D Design und visuelle Entwicklung",hours:"3",rate:"80"}]};
let state=normalizeState(loadState());
const sender={name:"MICHALIS SARIDIS",studio:"Persancte Studio",addressDe:["Wagenburgstr. 108","70186 Stuttgart","Deutschland"],addressEn:["Wagenburgstr. 108","70186 Stuttgart","Germany"],tax:"97207/08509",bank:"N26",iban:"DE28 1001 1001 2863 0493 70",bic:"NTSBDEB1XXX"};
const copy={
  de:{view:"View",recipient:"Empfänger",company:"Firma",address:"Adresse",invoiceData:"Rechnungsdaten",number:"Rechnungsnummer",invoiceDate:"Rechnungsdatum",deliveryDate:"Lieferdatum",paymentDays:"Zahlungsziel in Tagen",services:"Leistungen",descHint:"Lange Texte werden in der Vorschau automatisch umbrochen.",addService:"Leistung hinzufügen",export:"Export",reset:"Reset",saved:"Saved",live:"Live Vorschau",safe:"Umbruch aktiv",invoice:"Rechnung",to:"An",from:"Von",tax:"Steuernummer",metaNumber:"Rechnungsnummer",metaDate:"Rechnungsdatum",metaDelivery:"Lieferdatum",metaDue:"Fällig am",service:"Leistung",qty:"Std.",unit:"Satz",amount:"Betrag",total:"Gesamtbetrag",desc:"Beschreibung",hours:"Stunden",rate:"Stundensatz",placeholderCompany:"Firma / Name",placeholderAddress:"Straße\nPLZ Stadt\nLand",note1:"Gemäß § 19 UStG wird keine Umsatzsteuer berechnet.",note2:"Bitte überweisen Sie den Betrag innerhalb des angegebenen Zahlungsziels.",questions:"Bei Fragen stehe ich Ihnen gerne zur Verfügung.",bank:"Bank",previewWord:"Rechnung",overflow:"Weitere Positionen sind in dieser A4-Vorschau ausgeblendet."},
  en:{view:"View",recipient:"Recipient",company:"Company",address:"Address",invoiceData:"Invoice data",number:"Invoice number",invoiceDate:"Invoice date",deliveryDate:"Delivery date",paymentDays:"Payment terms in days",services:"Services",descHint:"Long text wraps automatically inside the preview.",addService:"Add service",export:"Export",reset:"Reset",saved:"Saved",live:"Live preview",safe:"Wrapping active",invoice:"Invoice",to:"To",from:"From",tax:"Tax number",metaNumber:"Invoice number",metaDate:"Invoice date",metaDelivery:"Delivery date",metaDue:"Due date",service:"Service",qty:"Hrs",unit:"Rate",amount:"Amount",total:"Total due",desc:"Description",hours:"Hours",rate:"Hourly rate",placeholderCompany:"Company / Name",placeholderAddress:"Street\nZIP City\nCountry",note1:"VAT exempt under § 19 UStG small business regulation.",note2:"Payment is due within the stated payment period.",questions:"Please feel free to get in touch if you have any questions.",bank:"Bank",previewWord:"Invoice",overflow:"Additional items are hidden in this A4 preview."}
};
function id(){return crypto&&crypto.randomUUID?crypto.randomUUID():"id-"+Math.random().toString(36).slice(2)}
function clone(x){return JSON.parse(JSON.stringify(x))}
function loadState(){try{const raw=localStorage.getItem("persancteInvoiceV3");return raw?{...clone(initial),...JSON.parse(raw)}:clone(initial)}catch(e){return clone(initial)}}
function normalizeState(raw){const next={...clone(initial),...(raw||{})};if(!Array.isArray(next.items)||!next.items.length)next.items=clone(initial.items);next.items=next.items.map(item=>{const normalized={...item};if(!normalized.id)normalized.id=id();if(normalized.desc==null)normalized.desc=normalized.service||normalized.description||"";if(normalized.hours==null||normalized.hours==="")normalized.hours="1";if(normalized.rate==null||normalized.rate==="")normalized.rate=normalized.amount||normalized.price||"";return normalized});return next}
function persist(){localStorage.setItem("persancteInvoiceV3",JSON.stringify(state));flashSaved()}
let toastTimer;function flashSaved(){const toast=$("#toast");$("#saveState").textContent=copy[state.lang].saved;toast.textContent=copy[state.lang].saved;toast.classList.add("visible");clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove("visible"),900)}
function parseNumber(value){const raw=String(value??"").replace(/\s/g,"").replace(/[€$£]/g,"").replace(/[^\d,.-]/g,"");if(!raw)return 0;let normalized=raw;if(raw.includes(",")&&raw.includes("."))normalized=raw.replace(/\./g,"").replace(",",".");else if(raw.includes(","))normalized=raw.replace(",",".");const number=Number(normalized);return Number.isFinite(number)?number:0}
function formatNumber(value){return new Intl.NumberFormat(state.lang==="de"?"de-DE":"en-US",{minimumFractionDigits:0,maximumFractionDigits:2}).format(value||0)}
function formatMoney(value){return new Intl.NumberFormat(state.lang==="de"?"de-DE":"en-US",{style:"currency",currency:state.currency,minimumFractionDigits:2,maximumFractionDigits:2}).format(value||0)}
function formatDate(value){if(!value)return "—";const date=new Date(value+"T00:00:00");if(Number.isNaN(date.getTime()))return value;return new Intl.DateTimeFormat(state.lang==="de"?"de-DE":"en-GB",{day:"2-digit",month:"2-digit",year:"numeric"}).format(date)}
function displayDate(value){return formatDate(value)}
function isoDate(date){return date.toISOString().slice(0,10)}
function monthName(year,month){return new Intl.DateTimeFormat(state.lang==="de"?"de-DE":"en-US",{month:"long",year:"numeric"}).format(new Date(year,month,1))}
function addDays(value,days){const date=new Date((value||today)+"T00:00:00");date.setDate(date.getDate()+(Number.parseInt(days,10)||0));return date.toISOString().slice(0,10)}
function escapeXml(value){return String(value??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&apos;")}
function escapeAttr(value){return escapeXml(value)}
function textLines(value){return String(value??"").split(/\r?\n/).map(line=>line.trim()).filter(Boolean)}
function wrapText(value,maxChars,maxLines=999){const source=textLines(value);const out=[];for(const line of source.length?source:[""]){let current="";for(const word of line.split(/\s+/)){const next=current?current+" "+word:word;if(next.length>maxChars){if(current)out.push(current);current=word.length>maxChars?word.slice(0,maxChars-1)+"…":word;if(out.length>=maxLines)break}else current=next}if(out.length>=maxLines)break;if(current)out.push(current)}return out.slice(0,maxLines)}
function textBlock(lines,x,y,size,lineHeight,fill,weight=400,anchor="start",opacity=1){let svg=`<text x="${x}" y="${y}" font-size="${size}" fill="${fill}" fill-opacity="${opacity}" font-weight="${weight}" text-anchor="${anchor}">`;(lines.length?lines:[""]).forEach((line,index)=>{svg+=`<tspan x="${x}" dy="${index===0?0:lineHeight}">${escapeXml(line)}</tspan>`});return svg+"</text>"}
function invoiceTotal(){return state.items.reduce((sum,item)=>sum+parseNumber(item.hours)*parseNumber(item.rate),0)}
function computedRows(){return state.items.map(item=>{const hours=parseNumber(item.hours);const rate=parseNumber(item.rate);return {...item,hoursValue:hours,rateValue:rate,total:hours*rate}})}
function buildSvg(){

  svg+=`<text x="${mx}" y="218" font-size="11" fill="${tertiary}" font-weight="700" letter-spacing="1.25">${escapeXml(t.from.toUpperCase())}</text>`;

  svg+=`<text x="${w-mx}" y="218" font-size="11" fill="${tertiary}" font-weight="700" letter-spacing="1.25" text-anchor="end">${escapeXml(t.to.toUpperCase())}</text>`;

  svg+=`<line x1="${mx}" y1="${tableTop}" x2="${w-mx}" y2="${tableTop}" stroke="${line}" stroke-width="1"/><text x="${mx}" y="${tableTop+28}" font-size="10.5" fill="${tertiary}" font-weight="700" letter-spacing="1.15">${escapeXml(t.service.toUpperCase())}</text><text x="466" y="${tableTop+28}" font-size="10.5" fill="${tertiary}" font-weight="700" letter-spacing="1.15" text-anchor="end">${escapeXml(t.qty.toUpperCase())}</text><text x="578" y="${tableTop+28}" font-size="10.5" fill="${tertiary}" font-weight="700" letter-spacing="1.15" text-anchor="end">${escapeXml(t.unit.toUpperCase())}</text><text x="${w-mx}" y="${tableTop+28}" font-size="10.5" fill="${tertiary}" font-weight="700" letter-spacing="1.15" text-anchor="end">${escapeXml(t.amount.toUpperCase())}</text><line x1="${mx}" y1="${tableTop+44}" x2="${w-mx}" y2="${tableTop+44}" stroke="${line}" stroke-opacity="0.55" stroke-width="1"/>`;

  svg+=`<text x="${mx}" y="${totalY}" font-size="10.5" fill="${tertiary}" font-weight="700" letter-spacing="1.15">${escapeXml(t.total.toUpperCase())}</text><text class="tab" x="${w-mx}" y="${totalY}" font-size="32" fill="${primary}" font-weight="600" letter-spacing="-1.2" text-anchor="end">${escapeXml(formatMoney(invoiceTotal()))}</text><line x1="${mx}" y1="${totalY+38}" x2="${w-mx}" y2="${totalY+38}" stroke="${line}" stroke-width="1"/>`;
  svg+=textBlock([t.note1,t.note2,t.questions],mx,footerY,11,16,secondary,400);
  svg+=textBlock([`${t.bank}: ${sender.bank}`,`IBAN: ${sender.iban}`,`BIC: ${sender.bic}`],w-mx,footerY,11,16,primary,430,"end");
  svg+=`<text x="${mx}" y="1064" font-size="10" fill="${tertiary}" font-weight="500">${escapeXml(sender.name)} · ${escapeXml(sender.studio)}</text></svg>`;
  return svg;
}
function renderText(){const t=copy[state.lang];document.documentElement.lang=state.lang;$("#canvasTitle").textContent=t.invoice;$("#statusLeft").textContent=t.live;$("#statusRight").textContent=t.safe;$("#recipientCompany").placeholder=t.placeholderCompany;$("#recipientAddress").placeholder=t.placeholderAddress;$$("[data-i18n]").forEach(el=>{const value=t[el.dataset.i18n];if(value)el.textContent=value});$$("[data-lang]").forEach(button=>button.classList.toggle("active",button.dataset.lang===state.lang));$$("[data-currency]").forEach(button=>button.classList.toggle("active",button.dataset.currency===state.currency));$$("[data-theme]").forEach(button=>button.classList.toggle("active",button.dataset.theme===state.theme));$("#saveState").textContent=t.saved;const d=new Date((state.invoiceDate||today)+"T00:00:00");$("#previewDay").textContent=String(d.getDate()).padStart(2,"0");$("#previewMonth").textContent=t.previewWord;}
function renderInputs(){["recipientCompany","recipientAddress","invoiceNumber","paymentDays"].forEach(idName=>{$("#"+idName).value=state[idName]||""});$("#invoiceDate").value=displayDate(state.invoiceDate);$("#deliveryDate").value=displayDate(state.deliveryDate)}
function makeEl(tag,className){const el=document.createElement(tag);if(className)el.className=className;return el}
function makeField(labelText,control){const label=makeEl("label","field");const span=document.createElement("span");span.textContent=labelText;label.append(span,control);return label}
function updateServiceItem(item,key,value){item[key]=value;renderPreview();schedulePersist()}
let persistTimer;function schedulePersist(){clearTimeout(persistTimer);persistTimer=setTimeout(()=>persist(),180)}
function makeInput(item,key,value){const input=document.createElement("input");input.type="text";input.dataset.item=item.id;input.dataset.key=key;input.inputMode="decimal";input.autocomplete="off";input.value=value||"";input.addEventListener("input",()=>updateServiceItem(item,key,input.value));input.addEventListener("click",event=>event.stopPropagation());input.addEventListener("pointerdown",event=>event.stopPropagation());return input}
function makeTextarea(item,key,value,placeholder){const area=document.createElement("textarea");area.dataset.item=item.id;area.dataset.key=key;area.placeholder=placeholder;area.value=value||"";area.addEventListener("input",()=>updateServiceItem(item,key,area.value));area.addEventListener("click",event=>event.stopPropagation());area.addEventListener("pointerdown",event=>event.stopPropagation());return area}
function renderServices(){const t=copy[state.lang];const list=$("#serviceList");list.innerHTML="";state.items.forEach((item,index)=>{const node=makeEl("div","service-item");const head=makeEl("div","service-head");const indexEl=makeEl("div","service-index");const dot=makeEl("span","dot");const number=document.createElement("span");number.textContent=String(index+1).padStart(2,"0");indexEl.append(dot,number);const remove=document.createElement("button");remove.className="remove";remove.dataset.remove=item.id;remove.type="button";remove.textContent="×";remove.disabled=state.items.length===1;head.append(indexEl,remove);const desc=makeTextarea(item,"desc",item.desc,t.desc);const descField=makeField(t.desc,desc);const grid=makeEl("div","field-grid");grid.append(makeField(t.hours,makeInput(item,"hours",item.hours)),makeField(t.rate,makeInput(item,"rate",item.rate)));node.append(head,descField,grid);list.appendChild(node)});$("#sidebarTotal").textContent=`${copy[state.lang].total}: ${formatMoney(invoiceTotal())}`}
function renderPreview(){$("#sheetPreview").innerHTML=buildSvg();$("#sidebarTotal").textContent=`${copy[state.lang].total}: ${formatMoney(invoiceTotal())}`}
function render(){document.documentElement.dataset.theme=state.theme;renderText();renderInputs();renderServices();renderPreview()}
function updateField(key,value){state[key]=value;renderText();renderPreview();persist()}
function addService(){state.items.push({id:id(),desc:"",hours:"1",rate:""});renderServices();renderPreview();persist()}
function removeService(itemId){if(state.items.length<=1)return;state.items=state.items.filter(item=>item.id!==itemId);renderServices();renderPreview();persist()}
function resetTool(){state=clone(initial);render();persist()}
function imageFromUrl(url){return new Promise((resolve,reject)=>{const image=new Image();image.onload=()=>resolve(image);image.onerror=reject;image.src=url})}
async function svgToCanvas(scale=3.125){const blob=new Blob([buildSvg()],{type:"image/svg+xml;charset=utf-8"});const url=URL.createObjectURL(blob);try{const image=await imageFromUrl(url);const canvas=document.createElement("canvas");canvas.width=Math.round(794*scale);canvas.height=Math.round(1123*scale);const ctx=canvas.getContext("2d");ctx.fillStyle="#ffffff";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.drawImage(image,0,0,canvas.width,canvas.height);return canvas}finally{URL.revokeObjectURL(url)}}
function filename(ext){const base=(state.invoiceNumber||"invoice").replace(/[^a-z0-9_-]+/gi,"_")||"invoice";return `${base}.${ext}`}
function downloadBlob(blob,name){const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),3000)}
async function exportPng(){const canvas=await svgToCanvas();const blob=await new Promise(resolve=>canvas.toBlob(resolve,"image/png"));if(blob)downloadBlob(blob,filename("png"))}
function exportSvg(){downloadBlob(new Blob([buildSvg()],{type:"image/svg+xml;charset=utf-8"}),filename("svg"))}
async function exportPdf(){const canvas=await svgToCanvas();const jpeg=await new Promise(resolve=>canvas.toBlob(resolve,"image/jpeg",.95));if(!jpeg)return;const bytes=new Uint8Array(await jpeg.arrayBuffer());const pdf=createPdf(bytes,595.28,841.89,canvas.width,canvas.height);downloadBlob(new Blob([pdf],{type:"application/pdf"}),filename("pdf"))}
function createPdf(jpeg,pageW,pageH,imgW,imgH){const encoder=new TextEncoder();const chunks=[];const offsets=[0];let length=0;const addText=text=>{const bytes=encoder.encode(text);chunks.push(bytes);length+=bytes.length};const addBytes=bytes=>{chunks.push(bytes);length+=bytes.length};const mark=()=>offsets.push(length);addText("%PDF-1.4\n%\xE2\xE3\xCF\xD3\n");mark();addText("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n");mark();addText("2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n");mark();addText(`3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW.toFixed(2)} ${pageH.toFixed(2)}] /Resources << /XObject << /Im0 5 0 R >> >> /Contents 4 0 R >>\nendobj\n`);const content=`q\n${pageW.toFixed(2)} 0 0 ${pageH.toFixed(2)} 0 0 cm\n/Im0 Do\nQ\n`;mark();addText(`4 0 obj\n<< /Length ${content.length} >>\nstream\n${content}endstream\nendobj\n`);mark();addText(`5 0 obj\n<< /Type /XObject /Subtype /Image /Width ${imgW} /Height ${imgH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpeg.length} >>\nstream\n`);addBytes(jpeg);addText("\nendstream\nendobj\n");const xref=length;addText(`xref\n0 ${offsets.length}\n0000000000 65535 f \n`);for(let i=1;i<offsets.length;i++)addText(String(offsets[i]).padStart(10,"0")+" 00000 n \n");addText(`trailer\n<< /Size ${offsets.length} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`);const out=new Uint8Array(length);let offset=0;for(const chunk of chunks){out.set(chunk,offset);offset+=chunk.length}return out}

let datePickerState={field:null,year:null,month:null};
function openDatePicker(field){const input=$("#"+field);const current=new Date((state[field]||today)+"T00:00:00");datePickerState={field,year:current.getFullYear(),month:current.getMonth()};renderDatePicker();const popover=$("#datePicker");const rect=input.getBoundingClientRect();const width=276;let left=Math.min(rect.left,window.innerWidth-width-12);left=Math.max(12,left);let top=rect.bottom+8;if(top+350>window.innerHeight)top=Math.max(12,rect.top-350);popover.style.left=left+"px";popover.style.top=top+"px";popover.classList.add("visible");}
function closeDatePicker(){datePickerState.field=null;$("#datePicker").classList.remove("visible")}
function renderDatePicker(){const popover=$("#datePicker");const {field,year,month}=datePickerState;if(!field)return;const selected=state[field];const todayIso=today;const first=new Date(year,month,1);const start=new Date(year,month,1);const offset=(first.getDay()+6)%7;start.setDate(start.getDate()-offset);const weekdays=state.lang==="de"?["M","D","M","D","F","S","S"]:["M","T","W","T","F","S","S"];let html=`<div class="date-picker-head"><button class="date-nav" data-date-nav="prev" type="button" aria-label="Previous month">‹</button><div class="date-picker-title">${escapeXml(monthName(year,month))}</div><button class="date-nav" data-date-nav="next" type="button" aria-label="Next month">›</button></div><div class="weekday-row">${weekdays.map(day=>`<div class="weekday">${day}</div>`).join("")}</div><div class="date-grid">`;for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const iso=isoDate(d);const classes=["day-button"];if(d.getMonth()!==month)classes.push("muted");if(iso===todayIso)classes.push("today");if(iso===selected)classes.push("selected");html+=`<button class="${classes.join(" ")}" data-date-value="${iso}" type="button">${d.getDate()}</button>`}html+=`</div><div class="date-picker-foot"><button class="date-foot-button" data-date-action="today" type="button">Heute</button><button class="date-foot-button" data-date-action="close" type="button">Close</button></div>`;popover.innerHTML=html;}
function moveDateMonth(delta){let {year,month}=datePickerState;month+=delta;if(month<0){month=11;year-=1}else if(month>11){month=0;year+=1}datePickerState.year=year;datePickerState.month=month;renderDatePicker()}
$("#datePicker").addEventListener("click",event=>{const nav=event.target.closest("[data-date-nav]");if(nav){moveDateMonth(nav.dataset.dateNav==="prev"?-1:1);return}const day=event.target.closest("[data-date-value]");if(day&&datePickerState.field){state[datePickerState.field]=day.dataset.dateValue;render();persist();closeDatePicker();return}const action=event.target.closest("[data-date-action]");if(action){if(action.dataset.dateAction==="today"&&datePickerState.field){state[datePickerState.field]=today;render();persist()}closeDatePicker()}});

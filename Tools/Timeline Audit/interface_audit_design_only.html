<!doctype html>
<html lang="de" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interface Audit</title>
<style>
:root{
  color-scheme:dark;
  --bg:#1C1C1E;
  --canvas:#1C1C1E;
  --sidebar:rgba(40,40,40,.40);
  --sidebar-line:rgba(255,255,255,.05);
  --glass:rgba(30,30,32,.40);
  --glass-line:rgba(255,255,255,.12);
  --active-pill:rgba(255,255,255,.10);
  --text-primary:rgba(255,255,255,.95);
  --text-secondary:rgba(255,255,255,.60);
  --text-muted:rgba(255,255,255,.50);
  --text-tertiary:rgba(255,255,255,.40);
  --node:rgba(255,255,255,.20);
  --ghost:rgba(255,255,255,.03);
  --ghost-line:rgba(255,255,255,.08);
  --blue:#0A84FF;
  --yellow:#FFD60A;
  --cyan:#64D2FF;
  --green:#32D74B;
  --orange:#FF9F0A;
  --purple:#BF5AF2;
  --gray:#8E8E93;
  --accent:#0A84FF;
  --accent-contrast:#fff;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;
  --ambient-bg:none;
  --spring:cubic-bezier(.22,1,.36,1);
  --spring-time:320ms;
}
@supports (animation-timing-function: linear(0,1)){
  :root{--spring:linear(0,0.06,0.25,0.55,0.81,0.98,1.05,1.07,1.05,1);--spring-time:520ms;}
}
html[data-theme="light"]{
  color-scheme:light;
  --bg:#F2F2F7;
  --canvas:#F2F2F7;
  --sidebar:rgba(255,255,255,.30);
  --sidebar-line:rgba(0,0,0,.04);
  --glass:rgba(255,255,255,.72);
  --glass-line:rgba(0,0,0,.06);
  --active-pill:rgba(0,0,0,.06);
  --text-primary:rgba(0,0,0,.95);
  --text-secondary:rgba(60,60,67,.60);
  --text-muted:rgba(60,60,67,.50);
  --text-tertiary:rgba(60,60,67,.40);
  --node:rgba(0,0,0,.20);
  --ghost:rgba(0,0,0,.03);
  --ghost-line:rgba(0,0,0,.06);
  --ambient-bg:radial-gradient(circle at 50% 0%,rgba(255,255,255,.03) 0%,transparent 70%);
}
*{box-sizing:border-box;scrollbar-width:none;-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;}
::-webkit-scrollbar{display:none;}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background-color:var(--bg);background-image:var(--ambient-bg);color:var(--text-primary);font-family:var(--font);overscroll-behavior:none;}
button,input,textarea{font:inherit;color:inherit;}
button{border:0;background:none;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid rgba(10,132,255,.32);outline-offset:2px;}
input,textarea{border:0;outline:none;}
input[type="search"]{height:36px;min-height:36px;margin:0;line-height:normal;border:0;border-radius:8px;padding:0 10px;background-color:rgba(255,255,255,.05);color:var(--text-primary);outline:none;font-size:14px;font-weight:500;letter-spacing:-.01em;}
html[data-theme="light"] input[type="search"]{background-color:rgba(0,0,0,.04);}
input[type="checkbox"]{accent-color:var(--accent);}
textarea{width:100%;min-height:164px;resize:vertical;border-radius:12px;padding:10px 11px;background:rgba(255,255,255,.05);color:var(--text-primary);font-size:13px;line-height:1.45;font-weight:400;letter-spacing:-.01em;}
html[data-theme="light"] textarea{background:rgba(0,0,0,.04);}
.app{display:grid;grid-template-columns:300px minmax(0,1fr) 308px;height:100vh;min-height:0;}
.sidebar,.inspector{min-height:0;overflow:auto;overflow-x:hidden;padding:20px 12px;background:var(--sidebar);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border-color:var(--sidebar-line);}
.sidebar{border-right:.5px solid var(--sidebar-line);}
.inspector{border-left:.5px solid var(--sidebar-line);}
.canvas{position:relative;min-width:0;min-height:0;overflow:auto;background-color:var(--canvas);background-image:var(--ambient-bg);overscroll-behavior:none;}
.brand{display:flex;flex-direction:column;padding:0 10px 18px;gap:7px;}
.brand h1{margin:0;font-size:17px;line-height:1;font-weight:600;letter-spacing:-.02em;color:var(--text-primary);}
.brand .sub{max-width:220px;color:var(--text-tertiary);font-size:12px;line-height:1.35;font-weight:500;letter-spacing:-.01em;}
.progress-wrap{padding:4px 4px 14px;}
.progress-row{display:flex;align-items:center;justify-content:space-between;margin:0 6px 8px;color:var(--text-muted);font-size:13px;font-weight:500;letter-spacing:-.01em;}
.progress-bar{height:5px;border-radius:999px;background:var(--active-pill);overflow:hidden;}
.progress-fill{height:100%;width:0;background:var(--accent);border-radius:999px;transition:width var(--spring-time) var(--spring);}
.tools{display:grid;gap:6px;padding:0 4px 14px;}
.search{width:100%;}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.btn{min-height:36px;border-radius:8px;padding:0 10px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text-muted);font-size:14px;font-weight:500;letter-spacing:-.01em;transition:background var(--spring-time) var(--spring),color var(--spring-time) var(--spring),transform 120ms ease;}
.btn:hover{background:var(--active-pill);color:var(--text-primary);}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--active-pill);color:var(--text-primary);}
.accent-row{display:flex;gap:7px;padding:2px 2px 2px;}
.swatch{width:26px;height:26px;border-radius:50%;border:.5px solid var(--glass-line);box-shadow:0 1px 0 rgba(255,255,255,.18) inset;transition:transform 120ms ease,box-shadow var(--spring-time) var(--spring);}
.swatch:hover{transform:scale(1.04);}
.swatch:active{transform:scale(.96);}
.swatch.active{box-shadow:0 0 0 3px var(--active-pill),0 0 0 1px var(--text-tertiary) inset;}
.swatch[data-color="#111111"]{background:#111;}
.swatch[data-color="#0A84FF"]{background:#0A84FF;}
.swatch[data-color="#32D74B"]{background:#32D74B;}
.swatch[data-color="#FF9F0A"]{background:#FF9F0A;}
.swatch[data-color="#BF5AF2"]{background:#BF5AF2;}
.nav-title,.inspect-label{margin:0 0 8px;padding:0 10px;color:var(--text-muted);font-size:14px;font-weight:500;letter-spacing:-.01em;}
.nav{display:grid;gap:4px;padding:0 4px 24px;}
.nav a{min-height:34px;border-radius:8px;padding:0 10px;display:flex;align-items:center;gap:8px;color:var(--text-muted);text-decoration:none;font-size:14px;font-weight:500;letter-spacing:-.01em;transition:background var(--spring-time) var(--spring),color var(--spring-time) var(--spring),transform 120ms ease;}
.nav a:hover,.nav a.active{background:var(--active-pill);color:var(--text-primary);}
.nav a:active{transform:scale(.97);}
.nav .idx{width:20px;color:var(--text-tertiary);font-size:12px;font-weight:500;font-variant-numeric:tabular-nums;}
.topbar{position:sticky;top:18px;z-index:40;width:min(100% - 44px,980px);min-height:52px;margin:18px auto 0;padding:6px;border-radius:9999px;background:var(--glass);backdrop-filter:blur(24px) saturate(150%);-webkit-backdrop-filter:blur(24px) saturate(150%);border:.5px solid var(--glass-line);box-shadow:0 8px 32px rgba(0,0,0,.20);}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:18px;min-height:40px;padding:0 6px;}
.view-title{color:var(--text-primary);font-size:13px;font-weight:600;line-height:1.15;letter-spacing:-.01em;}
.view-meta{margin-top:3px;color:var(--text-tertiary);font-size:12px;line-height:1.2;font-weight:500;letter-spacing:-.01em;}
.top-actions{display:flex;align-items:center;gap:4px;}
.topbar .btn{min-height:40px;border-radius:9999px;padding:0 14px;font-size:13px;}
.content{max-width:980px;margin:0 auto;padding:42px 56px 80px;}
.section{scroll-margin-top:96px;margin:0 0 44px;}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin:0 0 24px;padding:0 2px;}
.section-title{margin:0;color:var(--text-primary);font-size:34px;line-height:1.05;font-weight:600;letter-spacing:-.035em;}
.section-count{color:var(--text-tertiary);font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}
.linear-stack{display:flex;flex-direction:column;gap:14px;}
.audit-card{width:100%;display:block;border:.5px solid transparent;border-radius:16px;background:transparent;overflow:hidden;transition:background var(--spring-time) var(--spring),border-color var(--spring-time) var(--spring),transform var(--spring-time) var(--spring),box-shadow var(--spring-time) var(--spring);scroll-margin-top:96px;}
.audit-card:hover,.audit-card.selected{background:var(--ghost);border-color:var(--ghost-line);transform:scale(1.005);}
.audit-card.selected{box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 34%, transparent),0 8px 32px rgba(0,0,0,.10);}
.audit-card.completed{background:color-mix(in srgb,var(--ghost) 74%, var(--accent) 8%);border-color:color-mix(in srgb,var(--ghost-line) 72%, var(--accent) 28%);}
.card-head{display:grid;grid-template-columns:32px minmax(0,1fr) auto;align-items:center;gap:12px;padding:14px 14px 12px;border-bottom:.5px solid var(--ghost-line);}
.card-title{min-width:0;color:var(--text-primary);font-size:17px;line-height:1.25;font-weight:600;letter-spacing:-.02em;}
.card-number{color:var(--text-tertiary);font-size:13px;font-weight:500;letter-spacing:-.01em;font-variant-numeric:tabular-nums;}
.card-check{width:16px;height:16px;margin:0;accent-color:var(--accent);}
.items{list-style:none;margin:0;padding:10px 14px 14px;display:grid;gap:4px;}
.item{display:grid;grid-template-columns:18px minmax(0,1fr);gap:8px;align-items:start;min-height:26px;padding:4px 6px;border-radius:8px;transition:background var(--spring-time) var(--spring);}
.item:hover{background:var(--active-pill);}
.item input{width:15px;height:15px;margin:3px 0 0;accent-color:var(--accent);}
.item span{color:var(--text-secondary);font-size:15px;line-height:1.5;font-weight:400;letter-spacing:-.01em;}
.item input:checked + span{color:var(--text-tertiary);text-decoration:line-through;text-decoration-thickness:1px;text-underline-offset:3px;}
.empty{display:none;margin:72px auto 0;max-width:360px;color:var(--text-secondary);text-align:center;}
.empty strong{display:block;color:var(--text-primary);font-size:20px;font-weight:600;letter-spacing:-.02em;margin-bottom:8px;}
.inspect-block{padding:4px 0 18px;}
.inspect-label{margin-top:16px;}
.inspect-title{margin:0 10px 8px;color:var(--text-primary);font-size:17px;line-height:1.12;font-weight:600;letter-spacing:-.02em;}
.inspect-section{margin:0 10px;color:var(--text-tertiary);font-size:12px;line-height:1.35;font-weight:500;letter-spacing:-.01em;}
.note{min-height:164px;margin:0 4px;width:calc(100% - 8px);}
.mini-stat{display:grid;grid-template-columns:1fr auto;gap:8px;min-height:34px;align-items:center;margin:0 4px;padding:0 10px;border-radius:8px;color:var(--text-muted);font-size:14px;font-weight:500;letter-spacing:-.01em;}
.mini-stat:hover{background:var(--active-pill);}
.mini-stat b{color:var(--text-primary);font-weight:600;font-variant-numeric:tabular-nums;}
.toast{position:fixed;left:50%;bottom:26px;z-index:100;display:flex;align-items:center;gap:10px;min-height:44px;padding:0 16px;border-radius:999px;background:var(--glass);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);border:.5px solid var(--glass-line);color:var(--text-primary);font-size:13px;font-weight:600;letter-spacing:-.01em;opacity:0;pointer-events:none;transform:translateX(-50%) translateY(10px);transition:opacity var(--spring-time) var(--spring),transform var(--spring-time) var(--spring);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:1ms!important;transition-duration:1ms!important;}}
@media(max-width:1180px){.app{grid-template-columns:260px minmax(0,1fr);}.inspector{display:none;}}
@media(max-width:760px){html,body{height:auto;overflow:auto;}.app{height:auto;min-height:100dvh;display:block;}.sidebar{position:sticky;top:0;z-index:50;max-height:52dvh;border-right:0;border-bottom:.5px solid var(--sidebar-line);}.canvas{overflow:visible;}.topbar{position:sticky;width:calc(100% - 24px);top:12px;margin-top:12px;}.topbar-inner{gap:8px;}.top-actions .btn{padding:0 10px;}.content{padding:28px 22px 60px;}.section-title{font-size:28px;}.section-head{align-items:flex-start;}.card-head{grid-template-columns:30px minmax(0,1fr);padding:14px 12px 11px;}.card-number{display:none;}.items{padding:8px 8px 12px;}}
@media print{html,body{height:auto;overflow:visible;background:#fff!important;color:#000!important;}.app{display:block;height:auto;}.sidebar,.inspector,.topbar,.toast{display:none!important;}.canvas{overflow:visible;background:#fff!important;}.content{max-width:none;padding:0;}.section{break-inside:auto;margin-bottom:16px;}.section-head{margin:20px 0 8px;}.section-title{font-size:22px;color:#000;}.audit-card{break-inside:avoid;page-break-inside:avoid;box-shadow:none!important;border:.5px solid #ddd!important;background:#fff!important;transform:none!important;margin-bottom:8px;}.item span{color:#222;}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><h1>Interface Audit</h1><div class="sub">Linear checklist for sound, control and interaction systems.</div></div>
    <div class="progress-wrap"><div class="progress-row"><span>Progress</span><span id="progressText">0%</span></div><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div></div>
    <div class="tools">
      <input id="search" class="search" type="search" placeholder="Search audit">
      <div class="btn-row"><button class="btn primary" id="checkVisible">Check visible</button><button class="btn" id="clearVisible">Clear visible</button></div>
      <div class="btn-row"><button class="btn" id="themeBtn">Dark</button><button class="btn" id="printBtn">Print</button></div>
      <div class="accent-row" aria-label="Accent color">
        <button class="swatch" data-color="#111111" aria-label="Black accent"></button><button class="swatch" data-color="#0A84FF" aria-label="Blue accent"></button><button class="swatch" data-color="#32D74B" aria-label="Green accent"></button><button class="swatch" data-color="#FF9F0A" aria-label="Orange accent"></button><button class="swatch" data-color="#BF5AF2" aria-label="Purple accent"></button>
      </div>
    </div>
    <div class="nav-title">Sections</div><nav id="nav" class="nav"></nav>
  </aside>
  <main class="canvas">
    <div class="topbar"><div class="topbar-inner"><div><div class="view-title" id="viewTitle">All sections</div><div class="view-meta" id="viewMeta">Linear view</div></div><div class="top-actions"><button class="btn" id="exportBtn">Export JSON</button><button class="btn" id="resetBtn">Reset</button></div></div></div>
    <div id="content" class="content"></div><div id="empty" class="empty"><strong>No matches</strong><span>Search terms do not match the current audit.</span></div>
  </main>
  <aside class="inspector">
    <div class="inspect-block"><div class="inspect-label">Selection</div><h2 class="inspect-title" id="inspectTitle">No card selected</h2><div class="inspect-section" id="inspectSection">Click a linear box to add notes.</div>
    <div class="inspect-label">Stats</div><div class="mini-stat"><span>Total items</span><b id="statTotal">0</b></div><div class="mini-stat"><span>Checked</span><b id="statChecked">0</b></div><div class="mini-stat"><span>Remaining</span><b id="statRemaining">0</b></div>
    <div class="inspect-label">Notes</div><textarea class="note" id="note" placeholder="Notes for selected box"></textarea></div>
  </aside>
</div>
<div class="toast" id="toast">Saved</div>
<script>
const DATA = [{"title": "0. Core Framework", "cards": [{"title": "0.1 User", "items": ["Klären, wer das Instrument benutzt und in welchem Erfahrungszustand die Person ist.", "Prüfen, ob die Person ohne störende Reibung handeln, verstehen, hören und reagieren kann.", "Berücksichtigen, dass Nutzung qualitativ und situationsabhängig ist: Kontext, Wissen, Aufmerksamkeit, körperliche Bedienung und Lernstand verändern die Erfahrung."]}, {"title": "0.2 Sound", "items": ["Definieren, welche Rolle Klang im Produkt spielt: Erzeugung, Veränderung, Steuerung oder Arrangement.", "Prüfen, ob Klangquellen, Modulation, Filterung, Routing, Aufnahme und Performance logisch erreichbar sind.", "Sound nicht getrennt vom Interface betrachten: Jede Kontrolle verändert eine hörbare oder musikalische Struktur."]}, {"title": "0.3 Control", "items": ["Entscheiden, welche Art von Kontrolle stattfindet: erzeugen, modulieren, triggern, auswählen, routen, aufnehmen oder performen.", "Jede Kontrolle muss eine klare Beziehung zwischen Geste, Parameter und Ergebnis haben.", "Physische Kontrolle soll direkte musikalische Handlung ermöglichen, nicht nur technische Bedienung."]}, {"title": "0.4 Layout", "items": ["Alle Controls so anordnen, dass sie zur Nutzungssituation passen: Studio, Bühne, Live, Lernen, Experiment.", "Sichtbarkeit, Gruppierung, Nähe, Gewichtung und Bewegungsrichtung sollen den Workflow unterstützen.", "Layout muss Prioritäten zeigen: Was ist primär, was ist sekundär, was ist selten?"]}, {"title": "0.5 Concept", "items": ["Das Produkt braucht eine erkennbare Grundidee, nicht nur eine Sammlung von Funktionen.", "Prüfen, ob das Konzept historisch, formal, musikalisch oder technisch klar positioniert ist.", "Das Interface soll seine Denkweise sichtbar machen: Grid, Matrix, Mixer, Keyboard, Modular, Gestural, Hybrid usw."]}, {"title": "0.6 Time", "items": ["Prüfen, wie das Produkt mit Zeit arbeitet: Sequenz, Loop, Dauer, Rhythmus, Aufnahme, Automatisierung, Verlauf.", "Zeit darf nicht nur technisch funktionieren, sondern muss für den Nutzer lesbar und manipulierbar sein.", "Entscheiden, ob das Interface eher Moment, Prozess, Performance oder Komposition unterstützt."]}]}, {"title": "1. Instrument Categories", "cards": [{"title": "1.1 Workstation", "items": ["Kombiniert Klangerzeugung, Editing, Sequencing, Sampling und Performance in einem System.", "Risiko: zu viele Funktionen können Orientierung und Direktheit schwächen."]}, {"title": "1.2 Sampler", "items": ["Arbeitet mit aufgenommenem Material, das gespielt, geschnitten, verändert oder sequenziert wird.", "Prüfen, ob Aufnahme, Auswahl, Mapping und Performance klar voneinander unterscheidbar sind."]}, {"title": "1.3 Synthesizer", "items": ["Erzeugt Klang über Oszillatoren, Filter, Hüllkurven, Modulation und Klangformung.", "Die Steuerung muss Klanglogik sichtbar machen: Quelle, Formung, Bewegung, Output."]}, {"title": "1.4 Effect", "items": ["Verändert eingehendes Klangmaterial statt primär Klang zu erzeugen.", "Dry/Wet, Signalweg und Intensität müssen besonders klar lesbar sein."]}, {"title": "1.5 Drum Machine", "items": ["Organisiert rhythmische Klänge über Pattern, Schritte, Pads, Sounds und Timing.", "Wichtig sind schneller Zugriff, Wiederholung, Variation und klare Statusanzeige."]}, {"title": "1.6 Sequencer", "items": ["Ordnet musikalische Ereignisse in Zeit und Reihenfolge.", "Steps, Pattern, Richtung, Länge und Variation müssen schnell verstanden werden."]}, {"title": "1.7 Mixer", "items": ["Führt Signale zusammen, balanciert sie und erlaubt Routing, Pegel, Pan, Sends und Mutes.", "Kanalstruktur und Signalfluss müssen sofort sichtbar sein."]}, {"title": "1.8 Acoustic Inspired", "items": ["Übernimmt Gesten oder Formen aus akustischen Instrumenten.", "Wichtig ist die Balance zwischen vertrauter Körperlichkeit und elektronischer Erweiterung."]}, {"title": "1.9 Recorder", "items": ["Nimmt Audio oder Performance-Daten auf und macht sie abrufbar, editierbar oder transformierbar.", "Aufnahmezustände, Overdub, Undo und Speicherlogik müssen eindeutig sein."]}, {"title": "1.10 Stage Piano / Keyboard", "items": ["Setzt auf Tastatur, Spielgefühl, direkte Performance und oft reduzierte Klangwahl.", "Die Hauptbedienung darf nicht von Menüs verdrängt werden."]}, {"title": "1.11 Controller", "items": ["Steuert externe oder interne Systeme, erzeugt aber nicht zwingend selbst Klang.", "Mapping, Status und Feedback sind hier kritisch, weil Klangquelle und Interface getrennt sein können."]}]}, {"title": "2. Interface Types", "cards": [{"title": "2.1 Touch-based", "items": ["Nutzt direkte Berührung auf Screens oder kapazitiven Flächen.", "Vorteil: flexible, dynamische Oberflächen; Risiko: weniger taktiles Gefühl und geringere Blindbedienbarkeit."]}, {"title": "2.2 Tangible", "items": ["Arbeitet mit physischen Elementen wie Knobs, Fadern, Pads, Tasten, Wheels oder Buttons.", "Vorteil: direktes Körperfeedback, Muskelgedächtnis und präzise Wiederholung."]}, {"title": "2.3 Graphical & Text-based", "items": ["Nutzt Bildschirme, Menüs, Texte, Wellenformen, Listen, Parameteranzeigen oder DAW-ähnliche Logik.", "Vorteil: hohe Informationsdichte; Risiko: mehr kognitive Last und Bildschirmabhängigkeit."]}, {"title": "2.4 Gestural & Sensor-based", "items": ["Nutzt Bewegung, Nähe, Lage, Licht, Druck, Beschleunigung oder andere Sensordaten.", "Vorteil: expressive Kontrolle; Risiko: Unschärfe, geringe Wiederholbarkeit und schwer erkennbare Grenzen."]}]}, {"title": "3. User", "cards": [{"title": "3.1 User-Centric Design", "items": ["Das Produkt aus User, Purpose und Context ableiten, nicht aus Featurelisten.", "User: Fähigkeiten, Erfahrung, Erwartungen, Präferenzen und Grenzen klären.", "Purpose: Aufgabe, musikalisches Ziel oder Performance-Situation definieren.", "Context: Umgebung, Setup, Kollaboration, Bühne, Studio, Mobilität und technische Abhängigkeiten prüfen."]}, {"title": "3.2 Context — Solo", "items": ["Einzelnutzung kann introspektiv, konzentriert und experimentell sein.", "Interface soll unabhängige Entscheidungen und flüssige Selbststeuerung unterstützen."]}, {"title": "3.3 Context — Collaborative", "items": ["Gemeinsame Nutzung braucht Lesbarkeit für mehrere Personen.", "Status, Rollen, Übergaben und geteilte Kontrolle müssen sichtbar sein."]}, {"title": "3.4 Context — Studio", "items": ["Studio-Kontext erlaubt mehr Tiefe, Display-Information und komplexere Workflows.", "Präzision, Wiederholbarkeit, Editing und Integration in bestehende Setups sind wichtiger."]}, {"title": "3.5 Context — Live", "items": ["Live-Kontext verlangt schnelle, robuste und fehlertolerante Bedienung.", "Kritische Controls müssen groß, eindeutig, erreichbar und unter Stress bedienbar sein."]}, {"title": "3.6 Workflow & Preference — Fixed / Targeted", "items": ["Unterstützt gezieltes Arbeiten mit klarer Absicht und vorhersehbarer Struktur.", "Gut für Nutzer, die wissen, was sie erreichen wollen."]}, {"title": "3.7 Workflow & Preference — Random / Exploratory", "items": ["Unterstützt Suche, Zufall, Entdeckung und unerwartete Ergebnisse.", "Gut für kreative Exploration, solange Orientierung und Rückkehrpunkte erhalten bleiben."]}, {"title": "3.8 Workflow & Preference — Cost", "items": ["Preis beeinflusst Erwartungen an Material, Funktionen, Haltbarkeit und professionellen Anspruch.", "Billig darf nicht automatisch unzuverlässig oder unklar wirken."]}, {"title": "3.9 Workflow & Preference — Build Quality", "items": ["Haptik, Gewicht, Widerstand, Stabilität und Materialität prägen Vertrauen.", "Mechanische Qualität beeinflusst, ob ein Instrument als Werkzeug oder Spielzeug gelesen wird."]}, {"title": "3.10 Workflow & Preference — Aesthetics", "items": ["Form und Oberfläche erzeugen erste Anziehung, aber nicht automatisch Loyalität.", "Ästhetik muss zur Funktion, Zielgruppe und musikalischen Haltung passen."]}, {"title": "3.11 Workflow & Preference — Functionality", "items": ["Featureumfang soll echte Nutzung unterstützen, nicht nur technische Überlegenheit zeigen.", "Wenige starke Funktionen sind oft besser als viele mittelmäßige."]}, {"title": "3.12 Knowledge & Skill Level — Beginner", "items": ["Anfänger brauchen sichtbare Logik, kurze Wege und geringe Einstiegshürde.", "Keine versteckten Pflichtfunktionen, die ohne Vorwissen nicht entdeckt werden."]}, {"title": "3.13 Knowledge & Skill Level — Novice", "items": ["Novices kennen erste Konzepte, brauchen aber noch Führung, Labels und klare Zustände.", "Das Interface soll Lernen ermöglichen, ohne dauerhaft zu vereinfachen."]}, {"title": "3.14 Knowledge & Skill Level — Experienced", "items": ["Erfahrene Nutzer wollen Geschwindigkeit, Tiefe, Abkürzungen und Kontrolle.", "Zu viel Schutz oder Vereinfachung kann als Einschränkung wirken."]}, {"title": "3.15 Knowledge & Skill Level — Flow", "items": ["Flow entsteht, wenn Schwierigkeit und Fähigkeit ausbalanciert sind.", "Zu leicht wird langweilig, zu schwer frustriert, passend herausfordernd wird produktiv."]}]}, {"title": "4. Interaction", "cards": [{"title": "4.1 User Box", "items": ["Das Interface muss berücksichtigen, dass der Mensch gleichzeitig wahrnimmt, entscheidet, handelt und bewertet.", "Gehirn: entscheidet, plant, erkennt Muster und bewertet Ergebnisse.", "Hände/Füße/Körper: führen physische Aktionen aus.", "Augen: nehmen visuelles Feedback auf.", "Ohren: nehmen auditives Feedback auf.", "Körpergefühl: liefert taktiles, räumliches und motorisches Feedback."]}, {"title": "4.2 Interface Box", "items": ["Das Interface übersetzt menschliche Eingaben in Systemdaten und Systemzustände zurück in wahrnehmbares Feedback.", "Tangible Input: Drücken, Drehen, Ziehen, Schieben, Spielen, Bewegen.", "Touch Input: Fingerberührung auf Fläche oder Screen.", "Gestural Input: Körperbewegungen oder räumliche Gesten.", "Data Input: Maus, Keyboard, Computer, digitale Signale.", "Sensory Input: Sensoren für Licht, Bewegung, Nähe, Klang usw.", "Visual Feedback: Screen, LED, Position, Anzeige, Grafik.", "Audible Feedback: Sound des Systems oder mechanischer Output.", "Tangible Feedback: Widerstand, Bewegung, Klick, Druck, Rastung, physischer Zustand."]}, {"title": "4.3 System Box", "items": ["Das System verarbeitet Eingaben und gibt Feedback über Interface und Klang zurück.", "Egal ob analog, digital, software- oder hardwarebasiert: der Zustand muss kommuniziert werden.", "Das Interface muss denselben Zustand zeigen, den das System intern verwendet."]}, {"title": "4.4 Feedback Loop", "items": ["Aktion erzeugt Systemreaktion; Reaktion erzeugt neues Verständnis; daraus folgt die nächste Aktion.", "Feedback muss unmittelbar, verständlich und ausreichend deutlich sein.", "Ohne zuverlässiges Feedback entsteht Unsicherheit, Fehlbedienung oder Kontrollverlust."]}]}, {"title": "5. Feedback", "cards": [{"title": "5.1 Feedback States", "items": ["Button gedrückt oder losgelassen.", "Screen-Menü markiert oder ausgewählt.", "Slider-Wert durch Farbe oder Position sichtbar.", "Blinking Cursor zeigt aktive Eingabe.", "Gerät zeigt Bereitschaft, Aktivität, Fehler, Modus oder Speicherung."]}, {"title": "5.2 Multimodal Feedback", "items": ["Feedback kann visuell, auditiv, taktil oder mechanisch sein.", "Gute Interfaces kombinieren mehrere Feedbackarten, ohne zu überladen.", "Entscheidend ist nicht Effekt, sondern klare Information."]}, {"title": "5.3 Performance Feedback", "items": ["In Live- oder Performance-Situationen muss Feedback aus Abstand, Bewegung und Stress heraus erkennbar sein.", "Farben, Helligkeit, Kontrast, Größe und Position müssen Zustände eindeutig machen."]}, {"title": "5.4 Feedback Failure", "items": ["Fehlendes oder verspätetes Feedback macht das System unzuverlässig.", "Wenn ein Parameter geändert wird, muss der Nutzer wissen, ob Änderung, Wert und Ziel wirklich übernommen wurden."]}]}, {"title": "6. Human Factor Loads", "cards": [{"title": "6.1 Visual Load", "items": ["Prüfen, wie viele visuelle Elemente gleichzeitig verarbeitet werden müssen.", "Anzeigen, Labels, Farben und Zustände sollen Orientierung geben, nicht konkurrieren.", "Status soll auf einen Blick erkennbar sein."]}, {"title": "6.2 Mental / Cognitive Load", "items": ["Prüfen, wie viel Erinnerung, Interpretation, Suche und Entscheidung das Interface verlangt.", "Komplexität darf nicht versteckt werden, wenn sie dadurch unverständlicher wird.", "Häufige Aufgaben müssen weniger Denkaufwand erzeugen als seltene Spezialfälle."]}, {"title": "6.3 Physical Load", "items": ["Prüfen, wie viel Kraft, Präzision, Reichweite, Haltung und Wiederholung nötig sind.", "Controls müssen ergonomisch erreichbar und über längere Zeit bedienbar sein.", "Live-Nutzung braucht andere körperliche Toleranzen als Studio-Editing."]}]}, {"title": "7. Task", "cards": [{"title": "7.1 Seven Stages of Action", "items": ["Ziel bilden.", "Absicht formulieren.", "Handlung festlegen.", "Handlung ausführen.", "Zustand der Welt wahrnehmen.", "Zustand interpretieren.", "Ergebnis bewerten."]}, {"title": "7.2 Functional", "items": ["Das Produkt muss erwartete Kernhandlungen zuverlässig ausführen.", "Einschalten, Sound erzeugen, Parameter ändern, speichern oder verbinden dürfen nicht fragil sein.", "Funktionen müssen zum Nutzungskontext passen, nicht nur auf dem Datenblatt existieren."]}, {"title": "7.3 Reliable", "items": ["Nutzer müssen dem Instrument vertrauen können.", "Hardware, Software, Firmware und mechanische Teile müssen stabil wirken und stabil sein.", "Fehler, Ausfälle oder inkonsistente Zustände zerstören musikalischen Flow."]}, {"title": "7.4 Usable", "items": ["Bedienung muss lernbar, verständlich, konsistent und fehlertolerant sein.", "Usability entsteht aus Ergonomie, Toleranz, Konsistenz, Klarheit, Discoverability, Struktur, Simplicity, Affordance und Control."]}, {"title": "7.5 Focus from Task", "items": ["Interaction, Feedback, Human Factor Loads, Workflow sowie Knowledge & Skills gemeinsam prüfen."]}]}, {"title": "8. Experience", "cards": [{"title": "8.1 Experience Principle", "items": ["Erfahrung entsteht nach der reinen Ausführung: durch Interpretation, Freude, Flow und Bewertung.", "Ein gutes Instrument kann kreativ, vertraut, überraschend und persönlich wirken."]}, {"title": "8.2 Enjoyable", "items": ["Freude entsteht physisch, psychologisch, sozial und biologisch.", "Form, Sound, Haptik, Reaktion und soziale Nutzung können Genuss erzeugen."]}, {"title": "8.3 Meaningful & Creative", "items": ["Ein Interface soll kreative Handlung ermöglichen, nicht nur Bedienung.", "Es darf Überraschungen erzeugen, solange sie produktiv und kontrollierbar bleiben."]}, {"title": "8.4 Trust & Loyalty", "items": ["Vertrauen entsteht durch Zuverlässigkeit, Wiedererkennbarkeit, Materialqualität und persönliche Bindung.", "Ein Instrument kann Teil der Identität des Nutzers werden, wenn es stabil, inspirierend und vertraut bleibt."]}, {"title": "8.5 Focus from Experience", "items": ["Context, Workflow, Preference, Knowledge & Skills gemeinsam prüfen."]}]}, {"title": "9. Enjoyable", "cards": [{"title": "9.1 Biological", "items": ["Freude kann aus rhythmischer, körperlicher, sensorischer und motorischer Befriedigung entstehen.", "Synchronität, Bewegung und hörbare Wirkung stärken das Gefühl von Präsenz."]}, {"title": "9.2 Psychological", "items": ["Freude entsteht durch Erfolg, Kontrolle, Überraschung, Neugier und sinnvolle Herausforderung.", "Das Interface soll weder überfordern noch langweilen."]}, {"title": "9.3 Physical", "items": ["Physische Freude entsteht durch gute Haptik, Widerstand, Gewicht, Druckpunkt, Bewegung und Form.", "Ein guter Control fühlt sich passend zum musikalischen Ergebnis an."]}, {"title": "9.4 Social", "items": ["Soziale Freude entsteht durch Teilen, Zeigen, Zusammenarbeiten, Performen und gemeinsames Verstehen.", "Das Produkt kann Community, Gespräch und gemeinsames Musizieren fördern."]}]}, {"title": "10. Usable", "cards": [{"title": "10.1 Simplicity", "items": ["So einfach wie möglich, aber nicht unterkomplex.", "Keine unnötigen Schritte, versteckten Umwege oder künstlichen Barrieren."]}, {"title": "10.2 Affordance", "items": ["Controls sollen andeuten, wie sie benutzt werden.", "Nutzer sollen erkennen: drücken, drehen, ziehen, halten, schieben oder berühren."]}, {"title": "10.3 Clarity", "items": ["Kommunikation muss eindeutig sein.", "Kontrast, Labels, Legenden und Statusanzeigen sollen Missverständnisse reduzieren."]}, {"title": "10.4 Discoverability", "items": ["Funktionen sollen auffindbar sein, ohne dass alles gleichzeitig sichtbar sein muss.", "Versteckte Funktionen brauchen klare Hinweise, Progression oder Kontext."]}, {"title": "10.5 Ergonomics", "items": ["Bedienung muss körperlich angenehm, erreichbar und wiederholbar sein.", "Größe, Abstand, Druck, Winkel und Handpositionen prüfen."]}, {"title": "10.6 Tolerance", "items": ["Fehler sollen vermeidbar, verzeihbar oder korrigierbar sein.", "Kritische Aktionen brauchen Schutz, Undo oder klare Bestätigung."]}, {"title": "10.7 Structure", "items": ["Elemente nach Nutzerlogik, mentalen Modellen und Funktionsgruppen ordnen.", "Struktur soll Abhängigkeiten und Prioritäten sichtbar machen."]}, {"title": "10.8 Consistency", "items": ["Gleiche Dinge sollen gleich aussehen und gleich funktionieren.", "Unterschiedliche Dinge sollen sichtbar unterschiedlich sein."]}, {"title": "10.9 Control", "items": ["Nutzer sollen das Gefühl haben, das System zu steuern, nicht vom System gesteuert zu werden.", "Abbrechen, Rückgängig, Stoppen, Halten und gezielte Änderung müssen möglich sein."]}]}, {"title": "11. Sound", "cards": [{"title": "11.1 Sound & Frequency", "items": ["Klang über Frequenz, Wellenform, Spektrum, Harmonische und Filterung verstehen.", "Sounddesign braucht sichtbare Beziehungen zwischen Welle, Modulation und hörbarem Ergebnis."]}, {"title": "11.2 Waveforms", "items": ["Sine: weich, rein, grundlegend.", "Square: kantig, obertonreich, digital/hohl lesbar.", "Ramp / Reverse Saw: ansteigende Sägezahnform.", "Sawtooth: fallende oder sägende Obertonstruktur.", "Triangle: weicher als Square, klarer als Sine.", "Random / Noise: unregelmäßig, rauschhaft, textural."]}, {"title": "11.3 Filters / EQ", "items": ["Filter und EQ entfernen, betonen oder formen Frequenzbereiche.", "Cutoff, Resonanz, Bandbreite und Kurvenform müssen hörbar und visuell verständlich sein."]}]}, {"title": "12. Control Mapping", "cards": [{"title": "12.1 Hardware Encoder Value Changes", "items": ["Encoder können physische Position und Parameterwert entkoppeln.", "Ohne klare Logik entstehen Sprünge, Unsicherheit oder falsche Erwartung."]}, {"title": "12.2 Absolute / Snap", "items": ["Der Parameter springt sofort auf die aktuelle physische Position.", "Schnell, aber riskant bei plötzlichen Klangänderungen."]}, {"title": "12.3 Pass-through / Pick-up", "items": ["Der Wert ändert sich erst, wenn die physische Position den aktuellen Parameterwert erreicht.", "Verhindert Sprünge, kann aber temporär wirkungslos wirken."]}, {"title": "12.4 Relative / Scaled", "items": ["Bewegung verändert den Wert relativ zur aktuellen Position.", "Vermeidet Sprünge und erlaubt sanfte Anpassung, braucht aber gutes Feedback."]}, {"title": "12.5 Knobs & Screens", "items": ["Virtuelle Knobs auf Screens sind flexibel, aber oft haptisch schwächer.", "Touchscreen-Knobs können präzise sein, brauchen jedoch klare Richtung, Reichweite und Wertanzeige.", "Für Hardware: direkte taktile Controls sind meist schneller und blinder bedienbar."]}]}, {"title": "13. Layout", "cards": [{"title": "13.1 Contrast", "items": ["Wichtige Elemente sind stärker sichtbar als unwichtige.", "Visueller Kontrast reicht für schnelle Orientierung.", "Aktive Zustände werden klar hervorgehoben.", "Kontrast ist funktional, nicht dekorativ."]}, {"title": "13.2 Grouping", "items": ["Zusammengehörige Controls sind gruppiert.", "Gruppen sind durch Abstand, Rahmen, Fläche oder Ausrichtung erkennbar.", "Falsche Nähe wird vermieden.", "Gruppierung unterstützt den Workflow."]}, {"title": "13.3 Alignment", "items": ["Elemente sind sauber ausgerichtet.", "Ausrichtung unterstützt Lesbarkeit und Ruhe.", "Achsen und Reihen sind nachvollziehbar.", "Visuelle Sprünge werden vermieden."]}, {"title": "13.4 Size", "items": ["Wichtige Controls sind größer oder prominenter.", "Touch- und Greifflächen sind ausreichend groß.", "Größe passt zur Nutzungssituation.", "Kleine Elemente sind nicht kritisch für Live-Nutzung."]}, {"title": "13.5 Placement", "items": ["Häufige Controls liegen an erreichbaren Positionen.", "Gefährliche Controls sind nicht versehentlich erreichbar.", "Platzierung unterstützt natürliche Handbewegungen.", "Es gibt eine erkennbare Bedienrichtung."]}, {"title": "13.6 Signal Flow", "items": ["Der Signalweg ist erkennbar.", "Quelle, Bearbeitung und Output sind logisch angeordnet.", "Es gibt eine lesbare Richtung.", "Routing wird nicht unnötig versteckt."]}, {"title": "13.7 Simplicity", "items": ["Das Layout ist reduziert genug.", "Überladung wird vermieden.", "Seltene Funktionen sind zurückgenommen.", "Die Hauptaufgabe bleibt sichtbar."]}, {"title": "13.8 Consistency", "items": ["Abstände, Größen und Zustände wiederholen sich logisch.", "Gleiche Komponenten verhalten sich gleich.", "Visuelle Regeln bleiben stabil.", "Es gibt keine zufälligen Layout-Ausnahmen."]}, {"title": "13.9 Ergonomics", "items": ["Das Layout unterstützt natürliche Handpositionen.", "Controls sind über längere Zeit erreichbar.", "Unbequeme Bewegungen werden vermieden.", "Einhändige und beidhändige Nutzung sind bedacht."]}, {"title": "13.10 Color", "items": ["Farbe wird semantisch eingesetzt.", "Farben sind nicht bloß dekorativ.", "Das Interface funktioniert auch ohne Farbe.", "Zustände sind farblich eindeutig."]}, {"title": "13.11 Text", "items": ["Labels sind kurz und präzise.", "Begriffe sind konsistent.", "Text ist groß genug.", "Text erklärt nicht, was besser gestaltet werden sollte."]}, {"title": "13.12 Graphics", "items": ["Grafiken unterstützen Orientierung oder Klangverständnis.", "Icons sind eindeutig.", "Dekorative Grafiken sind reduziert.", "Visuelle Symbole sind konsistent."]}, {"title": "13.13 Style", "items": ["Die visuelle Haltung passt zum Instrument.", "Der Stil ist funktional begründet.", "Kein generischer Look wird übernommen.", "Style unterstützt Vertrauen, Charakter und Bedienbarkeit."]}, {"title": "13.14 Identity / History", "items": ["Das Produkt bezieht sich sinnvoll auf bestehende Instrumentkulturen.", "Historische Referenzen sind verständlich.", "Nostalgie wird nicht nur dekorativ genutzt.", "Das Produkt hat eine eigene Identität."]}]}, {"title": "14. Concept", "cards": [{"title": "14.1 DAW", "items": ["Das Interface orientiert sich bewusst an Software-Workflows.", "Arrangement, Spuren, Clips oder Plugins sind nur relevant, wenn sie dem Produktziel dienen.", "Bildschirmkomplexität wird sinnvoll reduziert.", "Hardware-Direktheit bleibt trotz DAW-Logik erhalten."]}, {"title": "14.2 Steps", "items": ["Das Konzept arbeitet mit einzelnen Zeitschritten.", "Aktive Steps sind sichtbar.", "Länge, Richtung und Variation sind steuerbar.", "Die Step-Logik ist performbar."]}, {"title": "14.3 MPC", "items": ["Das Konzept nutzt Pad-basierte Performance.", "Samples, Pads und Sequencing sind klar verbunden.", "Rhythmische Eingabe ist direkt.", "Das Layout unterstützt Fingerdrumming oder schnelles Triggern."]}, {"title": "14.4 Grids", "items": ["Das System nutzt ein Raster.", "Zeilen und Spalten sind eindeutig.", "Das Grid ist musikalisch oder funktional sinnvoll gemappt.", "Orientierung bleibt bei komplexen Zuständen erhalten."]}, {"title": "14.5 Matrix", "items": ["Quellen und Ziele werden über Kreuzungen verbunden.", "Mapping oder Routing ist klar.", "Aktive Verbindungen sind sichtbar.", "Die Matrix kann schnell gelesen werden."]}, {"title": "14.6 Mixer", "items": ["Das Konzept ist kanalbasiert.", "Level, Pan, Sends und Mutes sind zentral.", "Signalfluss ist linear oder klar gruppiert.", "Mixen wird als Hauptlogik verstanden."]}, {"title": "14.7 DJ", "items": ["Das System unterstützt Übergänge, Tempo, Cueing oder Layering.", "Zwei oder mehrere Quellen sind vergleichbar.", "Live-Manipulation ist schnell erreichbar.", "Riskante Aktionen sind abgesichert."]}, {"title": "14.8 Generic", "items": ["Das Interface ist frei belegbar.", "Mapping bleibt trotzdem verständlich.", "Beliebigkeit wird durch Feedback verhindert.", "Es gibt klare Presets oder Strukturen."]}, {"title": "14.9 Hybrid", "items": ["Das Produkt kombiniert mehrere Interface-Logiken.", "Die Logiken sind sauber getrennt.", "Die Kombination erzeugt Mehrwert statt Verwirrung.", "Die Hauptidee bleibt erkennbar."]}, {"title": "14.10 Multitouch", "items": ["Das System unterstützt mehrere gleichzeitige Berührungen.", "Gesten und Fingerrollen sind klar.", "Visuelles Feedback ist schnell genug.", "Präzision bleibt trotz Glasfläche erreichbar."]}, {"title": "14.11 Configurable", "items": ["Der Nutzer kann das Interface anpassen.", "Anpassung bleibt verständlich.", "Defaults funktionieren sofort.", "Eigene Mappings sind speicherbar und lesbar."]}, {"title": "14.12 Semi-Modular", "items": ["Es gibt feste Struktur plus offene Verbindungen.", "Default-Signalwege sind klar.", "Patch-Möglichkeiten sind verständlich.", "Das System bleibt ohne Patching nutzbar."]}, {"title": "14.13 Modular", "items": ["Das System besteht aus unabhängigen Modulen.", "Ein- und Ausgänge sind verständlich.", "Signalrichtung ist klar.", "Experiment ist möglich, ohne vollständigen Kontrollverlust."]}, {"title": "14.14 Code", "items": ["Klang oder Verhalten wird über Code gesteuert.", "Code-Zugang ist für die Zielgruppe sinnvoll.", "Es gibt Feedback zwischen Code und Klang.", "Abstrakte Kontrolle wird verständlich gemacht."]}, {"title": "14.15 DIY / Maker", "items": ["Das Produkt ist offen für Bau, Modifikation oder Erweiterung.", "Teile, Logik und Dokumentation sind verständlich.", "Robustheit bleibt trotz Offenheit erhalten.", "Das Produkt fördert Aneignung."]}, {"title": "14.16 Collaborative", "items": ["Das Konzept ist für mehrere Nutzer gedacht.", "Parallele Eingriffe sind möglich.", "Rollen sind klar.", "Gemeinsames Verständnis wird unterstützt."]}, {"title": "14.17 Acoustic Inspired", "items": ["Das Konzept bezieht sich auf akustische Instrumente.", "Körperlichkeit wird sinnvoll übersetzt.", "Vertrautheit entsteht ohne Einschränkung.", "Die elektronische Erweiterung ist klar."]}, {"title": "14.18 Circular", "items": ["Das Konzept nutzt Kreisformen, Rotation oder zyklische Zeit.", "Die zyklische Logik ist verständlich.", "Die Form unterstützt Loop, Wiederholung oder Rotation.", "Kreisform wird funktional statt dekorativ eingesetzt."]}, {"title": "14.19 Hexagons", "items": ["Das Konzept nutzt hexagonale Nachbarschaft.", "Die räumliche Beziehung ist lesbar.", "Es entsteht ein Vorteil gegenüber quadratischem Raster.", "Orientierung im Raster bleibt erhalten."]}, {"title": "14.20 Gestural", "items": ["Körperbewegung ist zentral.", "Gesten sind ausdrucksstark und kontrollierbar.", "Grenzen sind klar.", "Performance wird sichtbar und hörbar verbunden."]}, {"title": "14.21 Virtual / Mixed Reality", "items": ["Das Konzept nutzt virtuelle oder gemischte Räume.", "Virtuelle Controls sind räumlich verständlich.", "Fehlende Materialität wird durch Feedback kompensiert.", "Immersion wird funktional genutzt."]}]}, {"title": "15. Final Audit", "cards": [{"title": "15.1 Core Fit", "items": ["User passt zu Task.", "Task passt zu Sound.", "Sound passt zu Control.", "Control passt zu Layout.", "Layout passt zu Concept."]}, {"title": "15.2 Failure Check", "items": ["Prüfen, wo der Nutzer den Systemzustand verlieren kann.", "Prüfen, wo ein Parameter ungewollt springen kann.", "Prüfen, wo Feedback zu schwach ist.", "Prüfen, wo körperliche Belastung zu hoch ist.", "Prüfen, wo visuelle Last zu hoch ist.", "Prüfen, wo Bedienung mit Gestaltung verwechselt wird."]}, {"title": "15.3 Design Decision Check", "items": ["Jede wichtige Entscheidung ist begründet.", "Keine Funktion existiert ohne klare Aufgabe.", "Kein Control existiert ohne klares Ziel.", "Kein Screen existiert ohne klare Informationspriorität.", "Keine Stilentscheidung existiert ohne funktionale Rolle."]}, {"title": "15.4 Product Readiness", "items": ["Ein Beginner kann starten.", "Ein Novice kann lernen.", "Ein Experienced User kann schnell arbeiten.", "Das Produkt funktioniert im vorgesehenen Kontext.", "Vertrauen entsteht.", "Musikalische Kontrolle entsteht.", "Eine eigenständige Identität entsteht."]}]}];
const STORAGE = 'interface-audit-design-only-v1';
const state = { checks: {}, notes: {}, selected: null, theme: 'light', accent: '#0A84FF' };
const root = document.documentElement;
const nav = document.getElementById('nav');
const content = document.getElementById('content');
const search = document.getElementById('search');
const empty = document.getElementById('empty');
const progressText = document.getElementById('progressText');
const progressFill = document.getElementById('progressFill');
const statTotal = document.getElementById('statTotal');
const statChecked = document.getElementById('statChecked');
const statRemaining = document.getElementById('statRemaining');
const inspectTitle = document.getElementById('inspectTitle');
const inspectSection = document.getElementById('inspectSection');
const note = document.getElementById('note');
const viewTitle = document.getElementById('viewTitle');
const viewMeta = document.getElementById('viewMeta');
const toast = document.getElementById('toast');
function slug(s){ return s.toLowerCase().normalize('NFKD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function esc(s){ return String(s).replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m])); }
function load(){ try{ Object.assign(state, JSON.parse(localStorage.getItem(STORAGE)||'{}')); }catch(e){} root.dataset.theme = state.theme || 'light'; document.getElementById('themeBtn').textContent = root.dataset.theme === 'dark' ? 'Light' : 'Dark'; setAccent(state.accent || '#0A84FF', false); }
function save(silent=true){ localStorage.setItem(STORAGE, JSON.stringify(state)); if(!silent) showToast('Saved'); }
function showToast(text){ toast.textContent=text; toast.classList.add('show'); clearTimeout(showToast.t); showToast.t=setTimeout(()=>toast.classList.remove('show'),1500); }
function render(){
  nav.innerHTML = DATA.map((section, si)=>`<a href="#${slug(section.title)}"><span class="idx">${String(si).padStart(2,'0')}</span><span>${esc(section.title.replace(/^\d+\.\s*/,''))}</span></a>`).join('');
  content.innerHTML = DATA.map((section, si)=>{
    const sid = slug(section.title);
    const cards = section.cards.map((card, ci)=>{
      const cid = `${sid}-${ci}`;
      const items = card.items.map((item, ii)=>{
        const key = `${cid}-${ii}`;
        return `<li class="item"><input type="checkbox" data-key="${key}" ${state.checks[key]?'checked':''}><span>${esc(item)}</span></li>`;
      }).join('');
      return `<article id="${cid}" class="audit-card" data-section="${esc(section.title)}" data-title="${esc(card.title)}" data-card-id="${cid}"><header class="card-head"><input class="card-check" type="checkbox" aria-label="Check full card"><div class="card-title">${esc(card.title)}</div><div class="card-number">${String(ci+1).padStart(2,'0')}</div></header><ul class="items">${items}</ul></article>`;
    }).join('');
    return `<section id="${sid}" class="section"><div class="section-head"><h2 class="section-title">${esc(section.title)}</h2><div class="section-count">${section.cards.length} boxes</div></div><div class="linear-stack">${cards}</div></section>`;
  }).join('');
  wireCards(); updateAll();
}
function wireCards(){
  document.querySelectorAll('.audit-card').forEach(card=>{
    card.addEventListener('click', e=>{ if(e.target.matches('input')) return; selectCard(card.dataset.cardId); });
    card.querySelector('.card-check').addEventListener('change', e=>{ const checked=e.target.checked; card.querySelectorAll('.item input').forEach(inp=>{ inp.checked=checked; state.checks[inp.dataset.key]=checked; }); updateAll(); save(); });
    card.querySelectorAll('.item input').forEach(inp=>{ inp.addEventListener('change',()=>{ state.checks[inp.dataset.key]=inp.checked; updateAll(); save(); }); });
  });
}
function updateAll(){
  const boxes = [...document.querySelectorAll('.audit-card')]; let total=0,checked=0,visible=0;
  boxes.forEach(card=>{ const inputs=[...card.querySelectorAll('.item input')]; const c=inputs.filter(i=>i.checked).length; total+=inputs.length; checked+=c; const all=inputs.length&&c===inputs.length; card.classList.toggle('completed',all); const cc=card.querySelector('.card-check'); cc.checked=all; cc.indeterminate=c>0&&!all; if(card.style.display!=='none') visible++; });
  const pct = total ? Math.round((checked/total)*100) : 0; progressText.textContent=pct+'%'; progressFill.style.width=pct+'%'; statTotal.textContent=total; statChecked.textContent=checked; statRemaining.textContent=total-checked; viewMeta.textContent=`${visible} boxes visible · ${checked}/${total} checked`;
}
function filter(){
  const q=search.value.trim().toLowerCase(); let visibleSections=0, visibleCards=0;
  document.querySelectorAll('.section').forEach(sec=>{ let secVisible=false; sec.querySelectorAll('.audit-card').forEach(card=>{ const text=(card.dataset.title+' '+card.dataset.section+' '+card.textContent).toLowerCase(); const show=!q||text.includes(q); card.style.display=show?'block':'none'; if(show){ secVisible=true; visibleCards++; } }); sec.style.display=secVisible?'block':'none'; if(secVisible) visibleSections++; });
  empty.style.display=visibleCards?'none':'block'; viewTitle.textContent=q ? `Search: ${q}` : 'All sections'; updateAll();
}
function selectCard(id){
  state.selected=id; document.querySelectorAll('.audit-card').forEach(c=>c.classList.toggle('selected',c.dataset.cardId===id));
  const card=document.querySelector(`[data-card-id="${CSS.escape(id)}"]`); if(!card) return;
  inspectTitle.textContent=card.dataset.title; inspectSection.textContent=card.dataset.section; note.value=state.notes[id]||''; save();
}
note.addEventListener('input',()=>{ if(!state.selected) return; state.notes[state.selected]=note.value; save(); });
function setAccent(color, persist=true){ state.accent=color; root.style.setProperty('--accent', color); root.style.setProperty('--accent-contrast', color==='#FF9F0A'||color==='#32D74B'?'#000':'#fff'); document.querySelectorAll('.swatch').forEach(b=>b.classList.toggle('active', b.dataset.color===color)); if(persist) save(); }
document.getElementById('themeBtn').addEventListener('click',()=>{ state.theme = root.dataset.theme === 'dark' ? 'light' : 'dark'; root.dataset.theme=state.theme; document.getElementById('themeBtn').textContent=state.theme==='dark'?'Light':'Dark'; save(); });
document.querySelectorAll('.swatch').forEach(b=>b.addEventListener('click',()=>setAccent(b.dataset.color)));
document.getElementById('printBtn').addEventListener('click',()=>window.print());
document.getElementById('exportBtn').addEventListener('click',()=>{ const blob=new Blob([JSON.stringify({date:new Date().toISOString(),checks:state.checks,notes:state.notes},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='interface-audit.json'; a.click(); URL.revokeObjectURL(a.href); });
document.getElementById('resetBtn').addEventListener('click',()=>{ if(!confirm('Reset all checks and notes?')) return; state.checks={}; state.notes={}; state.selected=null; save(); render(); showToast('Reset'); });
document.getElementById('checkVisible').addEventListener('click',()=>{ document.querySelectorAll('.audit-card').forEach(card=>{ if(card.style.display==='none') return; card.querySelectorAll('.item input').forEach(inp=>{ inp.checked=true; state.checks[inp.dataset.key]=true; }); }); updateAll(); save(false); });
document.getElementById('clearVisible').addEventListener('click',()=>{ document.querySelectorAll('.audit-card').forEach(card=>{ if(card.style.display==='none') return; card.querySelectorAll('.item input').forEach(inp=>{ inp.checked=false; state.checks[inp.dataset.key]=false; }); }); updateAll(); save(false); });
search.addEventListener('input',filter);
const io = new IntersectionObserver(entries=>{ const visible = entries.filter(e=>e.isIntersecting).sort((a,b)=>b.intersectionRatio-a.intersectionRatio)[0]; if(!visible) return; const id=visible.target.id; document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('active', a.getAttribute('href') === '#'+id)); }, {root:document.querySelector('.canvas'), threshold:[.15,.35,.65]});
load(); render(); document.querySelectorAll('.section').forEach(s=>io.observe(s)); if(state.selected) selectCard(state.selected);
</script>
</body>
</html>
